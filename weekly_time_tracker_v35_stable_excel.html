<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weekly Time Tracker</title><script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script><style>body{background:#0b0c10;color:#fff;font-family:-apple-system,Segoe UI,sans-serif;padding:20px}table{width:80%;margin:auto;table-layout:fixed;border-collapse:collapse;background:#17181c}th,td{border:1px solid #2f3138;padding:8px;text-align:center;vertical-align:middle}th:first-child,td:first-child{width:110px}input{width:58px;text-align:center;background:#2a2d34;color:#fff;border:0;border-radius:8px;padding:6px;font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em}.pos{color:#30d158}.neg{color:#ff453a}.zero{color:#8e8e93}.time-stack{font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em;white-space:pre}.actions{display:flex;justify-content:space-between;width:80%;margin:15px auto 0}.btn{padding:10px 18px;background:#3a3d45;color:#fff;border:1px solid #4a4d55;border-radius:10px}.btn:hover{background:#4a4d55}.corner-hidden{border:none!important;background:#0b0c10!important;box-shadow:none!important}thead th:nth-child(2){border-left:1px solid #2f3138!important}tbody tr:first-child td:first-child{border-top:1px solid #2f3138!important}.day-head{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15}.this-week-btn{padding:3px 9px;margin:0 0 5px;font-size:10px;border-radius:7px}.save-status{width:80%;margin:10px auto 0;text-align:right;color:#a7abb5;font-size:12px}.save-status.ok{color:#30d158}.save-status.err{color:#ff453a}</style></head><body><div style="width:80%;margin:0 auto 10px;display:grid;grid-template-columns:110px repeat(5,1fr);align-items:center"><button id='prevWeek' class='btn' style="grid-column:1;justify-self:start;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">‹</button><button id='thisWeek' class='btn' style="grid-column:2;justify-self:center;padding:4px 12px;font-size:11px;border-radius:8px">This week</button><h2 style='grid-column:3 / 6;grid-row:1;margin:0;text-align:center'>Weekly Time Tracker</h2><button id='nextWeek' class='btn' style="grid-column:6;grid-row:1;justify-self:end;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">›</button></div><table id='tbl'><thead><tr><th class='corner-hidden'></th><th id='a0'></th><th id='a1'></th><th id='a2'></th><th id='a3'></th><th id='a4'></th></tr></thead><tbody><tr><td>Clock In</td></tr><tr><td>Lunch Out</td></tr><tr><td>Lunch In</td></tr><tr><td>Clock Out</td></tr><tr><td>Daily Balance</td></tr><tr><td>Progress</td></tr></tbody></table><div class='actions'><button class='btn' onclick='fillTheoretical()'>Fill with Theoretical Hours</button><div><button id='folderBtn' class='btn' onclick='selectSaveFolder()'>Select OneDrive Folder</button> <button id='loadBtn' class='btn' onclick='loadFromExcel()'>Load from Excel</button> <button id='saveBtn' class='btn' onclick='saveFile()'>Save</button></div></div><div id='saveStatus' class='save-status'>Select your local OneDrive folder once</div><script>const days=['Mo','Tu','We','Th','Fr'];const b=document.querySelector('tbody');for(let r=0;r<4;r++){for(let d=0;d<5;d++){let td=document.createElement('td');td.innerHTML='<input>';b.rows[r].appendChild(td)}}for(let r=4;r<6;r++){for(let d=0;d<5;d++)b.rows[r].appendChild(document.createElement('td'))}let m=new Date();m.setDate(m.getDate()-((m.getDay()+6)%7));let weekOffset=0;const STORAGE_KEY='wttWeeksData';const OFFSET_KEY='wttWeekOffset';let weeksData=(window.__PRESET_WEEKS_DATA__||{});try{weeksData=JSON.parse(localStorage.getItem(STORAGE_KEY))||weeksData}catch(e){}function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(weeksData))}catch(e){}}function mondayFor(off){let d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7)+off*7);return d}function weekKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function saveCurrentWeek(){const key=weekKey(mondayFor(weekOffset));const vals=[];for(let r=0;r<4;r++){const row=[];for(let c=0;c<5;c++)row.push(b.rows[r].cells[c+1].firstChild.value);vals.push(row)}weeksData[key]=vals;persist()}function loadWeek(off){weekOffset=off;try{localStorage.setItem(OFFSET_KEY,String(off))}catch(e){}const mon=mondayFor(weekOffset);const key=weekKey(mon);const vals=weeksData[key];for(let i=0;i<5;i++){let d=new Date(mon);d.setDate(mon.getDate()+i);document.getElementById('a'+i).innerHTML="<div class='day-head'><span>"+days[i]+"</span><small>"+d.getDate()+'-'+d.toLocaleString('en',{month:'long'}).toLowerCase()+"</small></div>"}for(let r=0;r<4;r++)for(let c=0;c<5;c++)b.rows[r].cells[c+1].firstChild.value=vals?vals[r][c]:'';calc()}function commitInputs(){document.querySelectorAll('input').forEach(i=>{i.value=norm(i.value)})}document.getElementById('prevWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset-1)});document.getElementById('nextWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset+1)});document.addEventListener('click',e=>{if(e.target&&e.target.id==='thisWeek'){commitInputs();calc();loadWeek(0)}});function norm(v){v=(v||'').replace(/\D/g,'');if(!v)return'';let h,m;if(v.length<=2){h=+v;m=0}else if(v.length===3){h=+v[0];m=+v.slice(1)}else{h=+v.slice(0,-2);m=+v.slice(-2)}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}function mins(t,pm=false){if(!t)return null;let[a,b]=t.split(':').map(Number);if(pm&&a<12)a+=12;return a*60+b}function hm(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}function hmv(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}document.querySelectorAll('input').forEach(i=>i.addEventListener('change',e=>{e.target.value=norm(e.target.value);calc();scheduleAutoSave()}));function calc(){saveCurrentWeek();let cum=0;for(let c=0;c<5;c++){let ci=mins(b.rows[0].cells[c+1].firstChild.value,false);let lo=mins(b.rows[1].cells[c+1].firstChild.value,true);let li=mins(b.rows[2].cells[c+1].firstChild.value,true);let co=mins(b.rows[3].cells[c+1].firstChild.value,true);let h=0;if(ci!=null&&co!=null){if(lo!=null&&li!=null){h=((lo-ci)+(co-li))/60;}else{h=(co-ci)/60;}}cum+=h;let bal=h-7;b.rows[4].cells[c+1].innerHTML=h?`<div class='time-stack'>${hmv(h)}<br><span class='${bal>0?'pos':(bal<0?'neg':'zero')}'>${hm(bal)}</span></div>`:'';let prog=cum-((c+1)*7);b.rows[5].cells[c+1].innerHTML=`<div class='time-stack'>${hmv(cum)}<br><span class='${prog>0?'pos':(prog<0?'neg':'zero')}'>${hm(prog)}</span></div>`;}}function fillTheoretical(){for(let c=1;c<=5;c++){b.rows[0].cells[c].firstChild.value='09:00';b.rows[1].cells[c].firstChild.value='';b.rows[2].cells[c].firstChild.value='';b.rows[3].cells[c].firstChild.value='04:00';}calc();scheduleAutoSave()}document.querySelectorAll('input').forEach(inp=>inp.addEventListener('keydown',e=>{const inputs=[...document.querySelectorAll('input')],idx=inputs.indexOf(e.target),col=idx%5,row=Math.floor(idx/5);const go=(r,c)=>{if(r>=0&&r<4&&c>=0&&c<5){inputs[r*5+c].focus();inputs[r*5+c].select()}};if(e.key==='Enter'){e.preventDefault();e.shiftKey?go(row-1,col):(row<3?go(row+1,col):go(0,col+1))}else if(e.key==='ArrowUp'){e.preventDefault();go(row-1,col)}else if(e.key==='ArrowDown'){e.preventDefault();go(row+1,col)}else if(e.key==='ArrowLeft'){e.preventDefault();go(row,col-1)}else if(e.key==='ArrowRight'){e.preventDefault();go(row,col+1)}}));let startOffset=(typeof window.__PRESET_OFFSET__==='number'?window.__PRESET_OFFSET__:0);try{const so=parseInt(localStorage.getItem(OFFSET_KEY),10);if(!isNaN(so))startOffset=so}catch(e){}const hadData=!!weeksData[weekKey(mondayFor(startOffset))];loadWeek(startOffset);if(!hadData)fillTheoretical();const DB_NAME='weeklyTimeTrackerDB',DB_STORE='handles',DIR_KEY='saveDirectory',BLOCK_FIRST_ROW=2,BLOCK_STEP=10;
let saveDirectoryHandle=null,saveTimer=null,saveBusy=false,saveQueued=false,lastExcelModified=0;
function setSaveStatus(t,k=''){const e=document.getElementById('saveStatus');e.textContent=t;e.className='save-status'+(k?' '+k:'')}
function openDB(){return new Promise((ok,no)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(DB_STORE))r.result.createObjectStore(DB_STORE)};r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}
async function storeHandle(h){const d=await openDB();return new Promise((ok,no)=>{const t=d.transaction(DB_STORE,'readwrite');t.objectStore(DB_STORE).put(h,DIR_KEY);t.oncomplete=()=>{d.close();ok()};t.onerror=()=>no(t.error)})}
async function loadHandle(){const d=await openDB();return new Promise((ok,no)=>{const t=d.transaction(DB_STORE),r=t.objectStore(DB_STORE).get(DIR_KEY);r.onsuccess=()=>ok(r.result||null);r.onerror=()=>no(r.error);t.oncomplete=()=>d.close()})}
async function permission(h,ask=false){if(!h)return false;const o={mode:'readwrite'};if(await h.queryPermission(o)==='granted')return true;return ask&&await h.requestPermission(o)==='granted'}
async function selectSaveFolder(){if(!showDirectoryPicker){setSaveStatus('Use Microsoft Edge or Chrome.','err');return false}try{saveDirectoryHandle=await showDirectoryPicker({id:'weekly-time-tracker',mode:'readwrite'});await storeHandle(saveDirectoryHandle);folderBtn.textContent='Change Save Folder';setSaveStatus('Folder selected: '+saveDirectoryHandle.name,'ok');return true}catch(e){if(e.name!=='AbortError')setSaveStatus(e.message,'err');return false}}
async function ensureFolder(ask=true){if(!saveDirectoryHandle)saveDirectoryHandle=await loadHandle();if(saveDirectoryHandle&&await permission(saveDirectoryHandle,ask)){folderBtn.textContent='Change Save Folder';return true}return ask?selectSaveFolder():false}
const p2=n=>String(n).padStart(2,'0');
const sheetName=d=>d.getFullYear()+'-'+p2(d.getMonth()+1);
const annualName=d=>'weekly_time_tracker_'+d.getFullYear()+'.xlsx';
function keyDate(k){const a=k.split('-').map(Number);return new Date(a[0],a[1]-1,a[2],12)}
function xTime(v){if(!v)return null;const [h,m]=v.split(':').map(Number);return(h*60+m)/1440}
function textTime(v){if(v==null||v==='')return'';let f;if(typeof v==='number')f=((v%1)+1)%1;else if(v instanceof Date)f=(v.getUTCHours()*60+v.getUTCMinutes())/1440;else{const m=String(v).match(/(\d{1,2}):(\d{2})/);if(!m)return'';f=(+m[1]*60 + +m[2])/1440}const n=Math.round(f*1440)%1440;return p2(Math.floor(n/60))+':'+p2(n%60)}
function xDate(v){if(v instanceof Date)return new Date(v.getUTCFullYear(),v.getUTCMonth(),v.getUTCDate(),12);if(typeof v==='number'){const d=new Date(Date.UTC(1899,11,30)+Math.round(v*86400000));return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),12)}return null}
function border(){const x={style:'thin',color:{argb:'FF000000'}};return{top:x,left:x,bottom:x,right:x}}
function header(c){c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD0CECE'}};c.font={name:'Arial',size:14,bold:true};c.alignment={horizontal:'center',vertical:'middle'};c.border=border()}
function label(c){c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD0CECE'}};c.font={name:'Arial',size:12,bold:true};c.alignment={horizontal:'center',vertical:'middle'};c.border=border()}
function workedExpr(start,col){const L=`${col}${start+2}`,LO=`${col}${start+3}`,LI=`${col}${start+4}`,CO=`${col}${start+5}`;return`IF(AND(${L}<>\"\",${CO}<>\"\"),IF(AND(${LO}<>\"\",${LI}<>\"\"),(${LO}+IF(${LO}<TIME(12,0,0),0.5,0)-${L})+(${CO}+IF(${CO}<TIME(12,0,0),0.5,0)-(${LI}+IF(${LI}<TIME(12,0,0),0.5,0))),${CO}+IF(${CO}<TIME(12,0,0),0.5,0)-${L}),0)`}
function displayFormula(numeric){return`LET(m,ROUND((${numeric})*1440,0),IF(m=0,\"00:00\",IF(m<0,\"-\",\"\")&TEXT(ABS(m)/1440,\"[h]:mm\")))`}
function addBlock(ws,start,mon,vals){for(let c=2;c<=7;c++){header(ws.getCell(start,c));header(ws.getCell(start+1,c))}ws.getCell(start,2).value='';ws.getCell(start+1,2).value='';for(let i=0;i<5;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);ws.getCell(start,i+3).value=days[i];ws.getCell(start+1,i+3).value=d;ws.getCell(start+1,i+3).numFmt='dd-mmm'}const labels=['Clock in','Lunch out','Lunch in','Clock out','Daily Balance','Progress'];labels.forEach((x,r)=>{label(ws.getCell(start+2+r,2));ws.getCell(start+2+r,2).value=x;for(let i=0;i<5;i++){const c=ws.getCell(start+2+r,i+3);c.border=border();c.alignment={horizontal:'center',vertical:'middle'};c.font={name:'Arial',size:12,bold:r>=4};if(r<4){c.value=xTime(vals?.[r]?.[i]);if(c.value==null)c.value='';c.numFmt='h:mm'}}});for(let i=0;i<5;i++){const col=String.fromCharCode(67+i),daily=`(${workedExpr(start,col)}-TIME(7,0,0))`;ws.getCell(start+6,i+3).value={formula:`IF(OR(${col}${start+2}=\"\",${col}${start+5}=\"\"),\"\",${displayFormula(daily)})`};const parts=[];for(let j=0;j<=i;j++)parts.push(`(${workedExpr(start,String.fromCharCode(67+j))}-TIME(7,0,0))`);ws.getCell(start+7,i+3).value={formula:displayFormula(parts.join('+'))}}}
function clear(ws){if(ws.rowCount)ws.spliceRows(1,ws.rowCount);ws.columns=[]}
function buildMonth(ws,mon){clear(ws);ws.getColumn(1).width=3;ws.getColumn(2).width=19;for(let c=3;c<=7;c++)ws.getColumn(c).width=14;for(let r=1;r<=80;r++)ws.getRow(r).height=24;ws.views=[{showGridLines:true}];const sn=sheetName(mon),items=Object.entries(weeksData).map(([k,v])=>({d:keyDate(k),v})).filter(x=>sheetName(x.d)===sn).sort((a,b)=>a.d-b.d);items.forEach((x,i)=>addBlock(ws,BLOCK_FIRST_ROW+i*BLOCK_STEP,x.d,x.v));ws.pageSetup={orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0};ws.printArea=items.length?`B2:G${9+(items.length-1)*BLOCK_STEP}`:'B2:G9'}
function readBook(wb){const data={};for(const ws of wb.worksheets)for(let r=BLOCK_FIRST_ROW;r<=ws.rowCount;r+=BLOCK_STEP){const d=xDate(ws.getCell(r+1,3).value);if(!d)continue;data[weekKey(d)]=Array.from({length:4},(_,i)=>Array.from({length:5},(_,j)=>textTime(ws.getCell(r+2+i,j+3).value)))}return data}
async function fileHandle(mon,create=false){try{return await saveDirectoryHandle.getFileHandle(annualName(mon),{create})}catch(e){if(e.name==='NotFoundError')return null;throw e}}
async function loadBook(mon){const wb=new ExcelJS.Workbook(),h=await fileHandle(mon);if(h){const f=await h.getFile();lastExcelModified=f.lastModified;if(f.size)await wb.xlsx.load(await f.arrayBuffer())}return wb}
async function loadFromExcel(silent=false){if(!await ensureFolder(!silent))return false;try{const mon=mondayFor(weekOffset),h=await fileHandle(mon);if(!h){setSaveStatus('No annual Excel file yet. Press Save to create it.');return false}const f=await h.getFile(),wb=new ExcelJS.Workbook();await wb.xlsx.load(await f.arrayBuffer());const x=readBook(wb);Object.assign(weeksData,x);persist();lastExcelModified=f.lastModified;loadWeek(weekOffset);setSaveStatus('Loaded '+Object.keys(x).length+' week(s) from Excel.','ok');return true}catch(e){setSaveStatus('Load failed: '+e.message,'err');return false}}
async function excelBlob(){const mon=mondayFor(weekOffset),wb=await loadBook(mon),external=readBook(wb),current=weekKey(mon);for(const [k,v] of Object.entries(external))if(k!==current)weeksData[k]=v;const sn=sheetName(mon);let ws=wb.getWorksheet(sn);const state=ws?ws.state:'visible';if(!ws)ws=wb.addWorksheet(sn);buildMonth(ws,mon);ws.state=state;if(!wb.worksheets.some(x=>x.state==='visible'))ws.state='visible';wb.calcProperties.fullCalcOnLoad=true;wb.calcProperties.forceFullCalc=true;wb.calcProperties.calcMode='auto';return{fileName:annualName(mon),blob:new Blob([await wb.xlsx.writeBuffer()],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})}}
function htmlBlob(){const d=document.documentElement.cloneNode(true),old=d.querySelector('#snapshotData');if(old)old.remove();const x=document.createElement('script');x.id='snapshotData';x.textContent='window.__PRESET_WEEKS_DATA__='+JSON.stringify(weeksData)+';window.__PRESET_OFFSET__='+weekOffset+';';const main=[...d.querySelectorAll('script')].find(e=>e.textContent.trim().startsWith('const days='));main.parentNode.insertBefore(x,main);return new Blob(['<!DOCTYPE html>\n'+d.outerHTML],{type:'text/html;charset=utf-8'})}
async function write(name,blob){const h=await saveDirectoryHandle.getFileHandle(name,{create:true}),w=await h.createWritable();await w.write(blob);await w.close();return h.getFile()}
function scheduleAutoSave(){clearTimeout(saveTimer);if(saveDirectoryHandle){setSaveStatus('Changes pending...');saveTimer=setTimeout(()=>saveFile(true),1500)}}
async function saveFile(auto=false){if(saveBusy){saveQueued=true;return}if(!await ensureFolder(!auto))return;saveBusy=true;try{commitInputs();calc();const mon=mondayFor(weekOffset),h=await fileHandle(mon);if(h&&lastExcelModified&&(await h.getFile()).lastModified>lastExcelModified){setSaveStatus('Excel changed externally. Use Load from Excel first.','err');return}setSaveStatus('Saving stable Excel and HTML...');const e=await excelBlob(),files=await Promise.all([write(e.fileName,e.blob),write('weekly_time_tracker.html',htmlBlob())]);lastExcelModified=files[0].lastModified;setSaveStatus('Saved '+e.fileName+' and HTML.','ok')}catch(e){setSaveStatus('Save failed: '+e.message,'err');if(!auto)alert(e.message)}finally{saveBusy=false;if(saveQueued){saveQueued=false;scheduleAutoSave()}}}
(async()=>{try{saveDirectoryHandle=await loadHandle();if(saveDirectoryHandle){folderBtn.textContent='Change Save Folder';setSaveStatus(await permission(saveDirectoryHandle)?'Ready. Use Load from Excel after editing Excel.':'Press Save or Load to restore folder access.','ok')}}catch(e){}})();
</script></body></html>
