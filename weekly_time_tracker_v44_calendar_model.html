<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Weekly Time Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
    <style>
      body {
        background: #0b0c10;
        color: #fff;
        font-family:
          -apple-system,
          Segoe UI,
          sans-serif;
        padding: 20px;
      }
      table {
        width: 80%;
        margin: auto;
        table-layout: fixed;
        border-collapse: collapse;
        background: #17181c;
      }
      th,
      td {
        border: 1px solid #2f3138;
        padding: 8px;
        text-align: center;
        vertical-align: middle;
      }
      th:first-child,
      td:first-child {
        width: 110px;
      }
      input {
        width: 58px;
        text-align: center;
        background: #2a2d34;
        color: #fff;
        border: 0;
        border-radius: 8px;
        padding: 6px;
        font-family:
          ui-rounded,
          "SF Pro Rounded",
          "SF Compact Rounded",
          -apple-system,
          sans-serif;
        font-variant-numeric: tabular-nums;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.01em;
      }
      .pos {
        color: #30d158;
      }
      .neg {
        color: #ff453a;
      }
      .zero {
        color: #8e8e93;
      }
      .time-stack {
        font-family:
          ui-rounded,
          "SF Pro Rounded",
          "SF Compact Rounded",
          -apple-system,
          sans-serif;
        font-variant-numeric: tabular-nums;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.01em;
        white-space: pre;
      }
      .actions {
        display: flex;
        justify-content: space-between;
        width: 80%;
        margin: 15px auto 0;
      }
      .btn {
        padding: 10px 18px;
        background: #3a3d45;
        color: #fff;
        border: 1px solid #4a4d55;
        border-radius: 10px;
      }
      .btn:hover {
        background: #4a4d55;
      }
      .corner-hidden {
        border: none !important;
        background: #0b0c10 !important;
        box-shadow: none !important;
      }
      thead th:nth-child(2) {
        border-left: 1px solid #2f3138 !important;
      }
      tbody tr:first-child td:first-child {
        border-top: 1px solid #2f3138 !important;
      }
      .day-head {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        line-height: 1.15;
      }
      .this-week-btn {
        padding: 3px 9px;
        margin: 0 0 5px;
        font-size: 10px;
        border-radius: 7px;
      }
      .folder-top-btn {
        width: 30px;
        height: 30px;
        padding: 0;
        font-size: 11px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .folder-top-btn svg {
        width: 17px;
        height: 17px;
        display: block;
      }
      .icon-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .icon-btn {
        width: 32px !important;
        min-width: 32px !important;
        max-width: 32px !important;
        height: 32px !important;
        min-height: 32px !important;
        max-height: 32px !important;
        padding: 0 !important;
        display: inline-flex;
        flex: 0 0 32px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        box-sizing: border-box;
      }
      .icon-btn svg {
        width: 18px;
        height: 18px;
        display: block;
      }
      .save-status {
        width: 80%;
        margin: 10px auto 0;
        text-align: right;
        color: #a7abb5;
        font-size: 12px;
      }
      .save-status.ok {
        color: #30d158;
      }
      .save-status.err {
        color: #ff453a;
      }
    </style>
  </head>
  <body>
    <div
      style="
        width: 80%;
        margin: 0 auto 10px;
        display: grid;
        grid-template-columns: 110px repeat(5, 1fr);
        align-items: center;
      "
    >
      <button
        id="prevWeek"
        class="btn"
        style="
          grid-column: 1;
          justify-self: start;
          border-radius: 50%;
          width: 26px;
          height: 26px;
          padding: 0;
          font-size: 13px;
          line-height: 1;
        "
      >
        ‹</button
      ><button
        id="thisWeek"
        class="btn"
        style="
          grid-column: 2;
          justify-self: center;
          padding: 4px 12px;
          font-size: 11px;
          border-radius: 8px;
        "
      >
        This week
      </button>
      <h2
        style="grid-column: 3 / 6; grid-row: 1; margin: 0; text-align: center"
      >
        Weekly Time Tracker
      </h2>
      <button
        id="folderBtn"
        class="btn folder-top-btn"
        onclick="selectSaveFolder()"
        style="grid-column: 6; grid-row: 1; justify-self: center"
        title="Change save folder"
        aria-label="Change save folder"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M3 7.5h7l2-2h4.5A2.5 2.5 0 0 1 19 8v1H5a2 2 0 0 0-2 2z"
            fill="currentColor"
            opacity=".55"
          />
          <path
            d="M3 10h17l-2 9H5z"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            d="M3 10V7.5h7l2-2h4.5A2.5 2.5 0 0 1 19 8v2"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
        </svg></button
      ><button
        id="nextWeek"
        class="btn"
        style="
          grid-column: 6;
          grid-row: 1;
          justify-self: end;
          border-radius: 50%;
          width: 26px;
          height: 26px;
          padding: 0;
          font-size: 13px;
          line-height: 1;
        "
      >
        ›
      </button>
    </div>
    <table id="tbl">
      <thead>
        <tr>
          <th class="corner-hidden"></th>
          <th id="a0"></th>
          <th id="a1"></th>
          <th id="a2"></th>
          <th id="a3"></th>
          <th id="a4"></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Clock In</td>
        </tr>
        <tr>
          <td>Lunch Out</td>
        </tr>
        <tr>
          <td>Lunch In</td>
        </tr>
        <tr>
          <td>Clock Out</td>
        </tr>
        <tr>
          <td>Daily Balance</td>
        </tr>
        <tr>
          <td>Progress</td>
        </tr>
      </tbody>
    </table>
    <div class="actions">
      <button class="btn" onclick="fillTheoretical()">Autofill</button>
      <div class="icon-actions">
        <button
          class="btn icon-btn"
          onclick="loadFromExcel()"
          title="Refresh from Excel"
          aria-label="Refresh from Excel"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M20 6v5h-5M18.4 9A7 7 0 1 0 19 15M4 18v-5h5"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg></button
        ><button
          class="btn icon-btn"
          onclick="saveFile()"
          title="Save"
          aria-label="Save"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M5 4.5A1.5 1.5 0 0 1 6.5 3h9.9L20 6.6v10.9a3.5 3.5 0 0 1-3.5 3.5h-9A2.5 2.5 0 0 1 5 18.5zM8 3v6h8V3.2M8 21v-7h8v7"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </div>
    <div id="saveStatus" class="save-status">
      Select your local OneDrive folder once
    </div>
    <script>
      const days = ["Mo", "Tu", "We", "Th", "Fr"],
        b = document.querySelector("tbody"),
        STORAGE_KEY = "wttWeeksData",
        OFFSET_KEY = "wttWeekOffset";
      for (let r = 0; r < 4; r++)
        for (let d = 0; d < 5; d++) {
          const td = document.createElement("td");
          td.innerHTML = "<input>";
          b.rows[r].appendChild(td);
        }
      for (let r = 4; r < 6; r++)
        for (let d = 0; d < 5; d++)
          b.rows[r].appendChild(document.createElement("td"));
      let weekOffset = 0,
        weeksData = window.__PRESET_WEEKS_DATA__ || {};
      try {
        weeksData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || weeksData;
      } catch (e) {}
      const theoreticalWeek = () =>
        Array.from({ length: 4 }, (_, r) =>
          Array.from({ length: 5 }, () =>
            r === 0 ? "09:00" : r === 3 ? "04:00" : "",
          ),
        );
      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(weeksData));
      }
      function mondayFor(o) {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        d.setDate(d.getDate() - ((d.getDay() + 6) % 7) + o * 7);
        return d;
      }
      function weekKey(d) {
        return (
          d.getFullYear() +
          "-" +
          String(d.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(d.getDate()).padStart(2, "0")
        );
      }
      function monthId(d) {
        return (
          d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0")
        );
      }
      function ensureMonthWeeks(ref) {
        const y = ref.getFullYear(),
          m = ref.getMonth(),
          d = new Date(y, m, 1, 12);
        while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
        while (d.getMonth() === m) {
          const k = weekKey(d);
          if (!weeksData[k]) weeksData[k] = theoreticalWeek();
          d.setDate(d.getDate() + 7);
        }
        persist();
      }
      function saveCurrentWeek() {
        const k = weekKey(mondayFor(weekOffset)),
          v = [];
        for (let r = 0; r < 4; r++) {
          v[r] = [];
          for (let c = 0; c < 5; c++)
            v[r][c] = b.rows[r].cells[c + 1].firstChild.value;
        }
        weeksData[k] = v;
        persist();
      }
      function loadWeek(o) {
        weekOffset = o;
        localStorage.setItem(OFFSET_KEY, String(o));
        const mon = mondayFor(o);
        ensureMonthWeeks(mon);
        const v = weeksData[weekKey(mon)] || theoreticalWeek();
        for (let i = 0; i < 5; i++) {
          const d = new Date(mon);
          d.setDate(mon.getDate() + i);
          document.getElementById("a" + i).innerHTML =
            "<div class='day-head'><span>" +
            days[i] +
            "</span><small>" +
            d.getDate() +
            "-" +
            d.toLocaleString("en", { month: "long" }).toLowerCase() +
            "</small></div>";
        }
        for (let r = 0; r < 4; r++)
          for (let c = 0; c < 5; c++)
            b.rows[r].cells[c + 1].firstChild.value = v[r][c];
        calc();
      }
      function norm(v) {
        v = (v || "").replace(/\D/g, "");
        if (!v) return "";
        let h, m;
        if (v.length <= 2) {
          h = +v;
          m = 0;
        } else if (v.length === 3) {
          h = +v[0];
          m = +v.slice(1);
        } else {
          h = +v.slice(0, -2);
          m = +v.slice(-2);
        }
        return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
      }
      function mins(t, pm = false) {
        if (!t) return null;
        let [a, c] = t.split(":").map(Number);
        if (pm && a < 12) a += 12;
        return a * 60 + c;
      }
      function hm(x) {
        const m = Math.abs(Math.round(x * 60));
        return (
          String(Math.floor(m / 60)).padStart(2, "0") +
          ":" +
          String(m % 60).padStart(2, "0")
        );
      }
      function cls(x) {
        return x > 0 ? "pos" : x < 0 ? "neg" : "zero";
      }
      function commitInputs() {
        document
          .querySelectorAll("input")
          .forEach((i) => (i.value = norm(i.value)));
      }
      function calc() {
        saveCurrentWeek();
        let cum = 0;
        for (let c = 0; c < 5; c++) {
          const ci = mins(b.rows[0].cells[c + 1].firstChild.value),
            lo = mins(b.rows[1].cells[c + 1].firstChild.value, true),
            li = mins(b.rows[2].cells[c + 1].firstChild.value, true),
            co = mins(b.rows[3].cells[c + 1].firstChild.value, true);
          let h = 0;
          if (ci != null && co != null)
            h = (lo != null && li != null ? lo - ci + co - li : co - ci) / 60;
          cum += h;
          const bal = h - 7,
            prog = cum - (c + 1) * 7;
          b.rows[4].cells[c + 1].innerHTML =
            `<div class='time-stack'>${hm(h)}<br><span class='${cls(bal)}'>${hm(bal)}</span></div>`;
          b.rows[5].cells[c + 1].innerHTML =
            `<div class='time-stack'>${hm(cum)}<br><span class='${cls(prog)}'>${hm(prog)}</span></div>`;
        }
      }
      function fillTheoretical() {
        weeksData[weekKey(mondayFor(weekOffset))] = theoreticalWeek();
        persist();
        loadWeek(weekOffset);
        scheduleAutoSave();
      }
      document.getElementById("prevWeek").onclick = () => {
        commitInputs();
        calc();
        loadWeek(weekOffset - 1);
      };
      document.getElementById("nextWeek").onclick = () => {
        commitInputs();
        calc();
        loadWeek(weekOffset + 1);
      };
      document.getElementById("thisWeek").onclick = () => {
        commitInputs();
        calc();
        loadWeek(0);
      };
      document.querySelectorAll("input").forEach((i) => {
        i.onchange = (e) => {
          e.target.value = norm(e.target.value);
          calc();
          scheduleAutoSave();
        };
        i.onkeydown = (e) => {
          const a = [...document.querySelectorAll("input")],
            n = a.indexOf(e.target),
            c = n % 5,
            r = Math.floor(n / 5),
            go = (rr, cc) => {
              if (rr >= 0 && rr < 4 && cc >= 0 && cc < 5) {
                a[rr * 5 + cc].focus();
                a[rr * 5 + cc].select();
              }
            };
          if (e.key === "Enter") {
            e.preventDefault();
            e.shiftKey ? go(r - 1, c) : r < 3 ? go(r + 1, c) : go(0, c + 1);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            go(r - 1, c);
          } else if (e.key === "ArrowDown") {
            e.preventDefault();
            go(r + 1, c);
          } else if (e.key === "ArrowLeft") {
            e.preventDefault();
            go(r, c - 1);
          } else if (e.key === "ArrowRight") {
            e.preventDefault();
            go(r, c + 1);
          }
        };
      });
      const DB = "wttDB",
        STORE = "handles",
        DKEY = "dir",
        FIRST = 2,
        STEP = 10;
      let dir = null,
        timer = null,
        busy = false,
        queued = false,
        lastMod = 0;
      function status(t, k = "") {
        const e = document.getElementById("saveStatus");
        e.textContent = t;
        e.className = "save-status" + (k ? " " + k : "");
      }
      function openDB() {
        return new Promise((a, z) => {
          const r = indexedDB.open(DB, 1);
          r.onupgradeneeded = () => {
            if (!r.result.objectStoreNames.contains(STORE))
              r.result.createObjectStore(STORE);
          };
          r.onsuccess = () => a(r.result);
          r.onerror = () => z(r.error);
        });
      }
      async function putHandle(h) {
        const d = await openDB();
        return new Promise((a, z) => {
          const t = d.transaction(STORE, "readwrite");
          t.objectStore(STORE).put(h, DKEY);
          t.oncomplete = () => {
            d.close();
            a();
          };
          t.onerror = () => z(t.error);
        });
      }
      async function getHandle() {
        const d = await openDB();
        return new Promise((a, z) => {
          const t = d.transaction(STORE),
            r = t.objectStore(STORE).get(DKEY);
          r.onsuccess = () => a(r.result || null);
          r.onerror = () => z(r.error);
          t.oncomplete = () => d.close();
        });
      }
      async function allowed(h, ask) {
        if (!h) return false;
        const o = { mode: "readwrite" };
        if ((await h.queryPermission(o)) === "granted") return true;
        return ask && (await h.requestPermission(o)) === "granted";
      }
      async function selectSaveFolder() {
        try {
          dir = await showDirectoryPicker({ id: "wtt", mode: "readwrite" });
          await putHandle(dir);
          status("Folder selected: " + dir.name, "ok");
          return true;
        } catch (e) {
          if (e.name !== "AbortError") status(e.message, "err");
          return false;
        }
      }
      async function ensure(ask = true) {
        if (!dir) dir = await getHandle();
        if (dir && (await allowed(dir, ask))) return true;
        return ask ? selectSaveFolder() : false;
      }
      const sheetName = (d) => monthId(d),
        fileName = (d) => "weekly_time_tracker_" + d.getFullYear() + ".xlsx";
      function keyDate(k) {
        const x = k.split("-").map(Number);
        return new Date(x[0], x[1] - 1, x[2], 12);
      }
      function excelTime(v) {
        if (!v) return null;
        const x = v.split(":").map(Number);
        return (x[0] * 60 + x[1]) / 1440;
      }
      function textTime(v) {
        if (v == null || v === "") return "";
        let f;
        if (typeof v === "number") f = ((v % 1) + 1) % 1;
        else if (v instanceof Date)
          f = (v.getUTCHours() * 60 + v.getUTCMinutes()) / 1440;
        else return "";
        const n = Math.round(f * 1440) % 1440;
        return (
          String(Math.floor(n / 60)).padStart(2, "0") +
          ":" +
          String(n % 60).padStart(2, "0")
        );
      }
      function excelDate(v) {
        if (v instanceof Date)
          return new Date(
            v.getUTCFullYear(),
            v.getUTCMonth(),
            v.getUTCDate(),
            12,
          );
        if (typeof v === "number") {
          const d = new Date(Date.UTC(1899, 11, 30) + Math.round(v * 86400000));
          return new Date(
            d.getUTCFullYear(),
            d.getUTCMonth(),
            d.getUTCDate(),
            12,
          );
        }
        return null;
      }
      function border() {
        const x = { style: "thin", color: { argb: "FF000000" } };
        return { top: x, left: x, bottom: x, right: x };
      }
      function grey(c) {
        c.fill = {
          type: "pattern",
          pattern: "solid",
          fgColor: { argb: "FFD0CECE" },
        };
        c.font = { name: "Calibri", size: 11, bold: true };
        c.alignment = { horizontal: "center", vertical: "middle" };
        c.border = border();
      }
      function workExpr(s, col) {
        const a = `${col}${s + 2}`,
          o = `${col}${s + 3}`,
          i = `${col}${s + 4}`,
          d = `${col}${s + 5}`;
        return `IF(AND(${a}<>\"\",${d}<>\"\"),IF(AND(${o}<>\"\",${i}<>\"\"),(${o}+IF(${o}<TIME(12,0,0),0.5,0)-${a})+(${d}+IF(${d}<TIME(12,0,0),0.5,0)-(${i}+IF(${i}<TIME(12,0,0),0.5,0))),${d}+IF(${d}<TIME(12,0,0),0.5,0)-${a}),0)`;
      }
      function block(ws, s, d, v) {
        for (let c = 3; c <= 7; c++) {
          grey(ws.getCell(s, c));
          grey(ws.getCell(s + 1, c));
        }
        for (let c = 0; c < 5; c++) {
          const x = new Date(d);
          x.setDate(d.getDate() + c);
          ws.getCell(s, c + 3).value = days[c];
          ws.getCell(s + 1, c + 3).value = x;
          ws.getCell(s + 1, c + 3).numFmt = "dd-mmm";
        }
        const labs = [
          "Clock in",
          "Lunch out",
          "Lunch in",
          "Clock out",
          "Daily Balance",
          "Progress",
        ];
        labs.forEach((x, r) => {
          grey(ws.getCell(s + 2 + r, 2));
          ws.getCell(s + 2 + r, 2).value = x;
          for (let c = 0; c < 5; c++) {
            const q = ws.getCell(s + 2 + r, c + 3);
            q.border = border();
            q.alignment = { horizontal: "center", vertical: "middle" };
            q.font = { name: "Calibri", size: 11, bold: r >= 4 };
            if (r < 4) {
              q.value = excelTime(v[r][c]);
              if (q.value == null) q.value = "";
              q.numFmt = "h:mm";
            }
          }
        });
        for (let c = 0; c < 5; c++) {
          const col = String.fromCharCode(67 + c),
            w = workExpr(s, col);
          ws.getCell(s + 6, c + 3).value = { formula: w };
          ws.getCell(s + 6, c + 3).numFmt = "[h]:mm";
          const terms = [];
          for (let j = 0; j <= c; j++)
            terms.push(`(${workExpr(s, String.fromCharCode(67 + j))})`);
          ws.getCell(s + 7, c + 3).value = { formula: terms.join("+") };
          ws.getCell(s + 7, c + 3).numFmt = "[h]:mm";
        }
      }
      function clear(ws) {
        if (ws.rowCount) ws.spliceRows(1, ws.rowCount);
        ws.columns = [];
      }
      function buildMonth(ws, d) {
        ensureMonthWeeks(d);
        clear(ws);
        ws.getColumn(2).width = 11.81;
        for (let c = 3; c <= 7; c++) ws.getColumn(c).width = 7.64;
        const items = Object.entries(weeksData)
          .map(([k, v]) => ({ d: keyDate(k), v }))
          .filter((x) => sheetName(x.d) === sheetName(d))
          .sort((a, b) => a.d - b.d);
        items.forEach((x, i) => block(ws, FIRST + i * STEP, x.d, x.v));
        ws.printArea = `B2:G${9 + (items.length - 1) * STEP}`;
      }
      function importBook(wb) {
        const out = {};
        for (const ws of wb.worksheets)
          for (let r = FIRST; r <= ws.rowCount; r += STEP) {
            const d = excelDate(ws.getCell(r + 1, 3).value);
            if (d)
              out[weekKey(d)] = Array.from({ length: 4 }, (_, i) =>
                Array.from({ length: 5 }, (_, j) =>
                  textTime(ws.getCell(r + 2 + i, j + 3).value),
                ),
              );
          }
        return out;
      }
      async function fh(d, create = false) {
        try {
          return await dir.getFileHandle(fileName(d), { create });
        } catch (e) {
          if (e.name === "NotFoundError") return null;
          throw e;
        }
      }
      async function workbook(d) {
        const w = new ExcelJS.Workbook(),
          h = await fh(d);
        if (h) {
          const f = await h.getFile();
          lastMod = f.lastModified;
          if (f.size) await w.xlsx.load(await f.arrayBuffer());
        }
        return w;
      }
      async function loadFromExcel() {
        if (!(await ensure())) return;
        try {
          const d = mondayFor(weekOffset),
            h = await fh(d);
          if (!h) {
            status("No annual Excel file yet. Press Save.");
            return;
          }
          const f = await h.getFile(),
            w = new ExcelJS.Workbook();
          await w.xlsx.load(await f.arrayBuffer());
          Object.assign(weeksData, importBook(w));
          ensureMonthWeeks(d);
          persist();
          lastMod = f.lastModified;
          loadWeek(weekOffset);
          status("Updated from Excel.", "ok");
        } catch (e) {
          status("Update failed: " + e.message, "err");
        }
      }
      async function excelBlob() {
        const d = mondayFor(weekOffset),
          w = await workbook(d),
          external = importBook(w),
          cur = weekKey(d);
        for (const [k, v] of Object.entries(external))
          if (k !== cur) weeksData[k] = v;
        ensureMonthWeeks(d);
        let ws = w.getWorksheet(sheetName(d)),
          state = ws ? ws.state : "visible";
        if (!ws) ws = w.addWorksheet(sheetName(d));
        buildMonth(ws, d);
        ws.state = state;
        if (!w.worksheets.some((x) => x.state === "visible"))
          ws.state = "visible";
        w.calcProperties.fullCalcOnLoad = true;
        w.calcProperties.forceFullCalc = true;
        return {
          name: fileName(d),
          blob: new Blob([await w.xlsx.writeBuffer()], {
            type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
          }),
        };
      }
      function htmlBlob() {
        const d = document.documentElement.cloneNode(true),
          old = d.querySelector("#snapshotData"),
          x = document.createElement("script");
        if (old) old.remove();
        x.id = "snapshotData";
        x.textContent =
          "window.__PRESET_WEEKS_DATA__=" +
          JSON.stringify(weeksData) +
          ";window.__PRESET_OFFSET__=" +
          weekOffset +
          ";";
        const q = [...d.querySelectorAll("script")].find((e) =>
          e.textContent.trim().startsWith("const days="),
        );
        q.parentNode.insertBefore(x, q);
        return new Blob(["<!DOCTYPE html>\n" + d.outerHTML], {
          type: "text/html;charset=utf-8",
        });
      }
      async function write(n, blob) {
        const h = await dir.getFileHandle(n, { create: true }),
          w = await h.createWritable();
        await w.write(blob);
        await w.close();
        return h.getFile();
      }
      function scheduleAutoSave() {
        clearTimeout(timer);
        if (dir) {
          status("Changes pending...");
          timer = setTimeout(() => saveFile(true), 1500);
        }
      }
      async function saveFile(auto = false) {
        if (busy) {
          queued = true;
          return;
        }
        if (!(await ensure(!auto))) return;
        busy = true;
        try {
          commitInputs();
          calc();
          const d = mondayFor(weekOffset),
            h = await fh(d);
          if (h && lastMod && (await h.getFile()).lastModified > lastMod) {
            status("Excel changed externally. Refresh first.", "err");
            return;
          }
          status("Saving...");
          const e = await excelBlob(),
            f = await Promise.all([
              write(e.name, e.blob),
              write("weekly_time_tracker.html", htmlBlob()),
            ]);
          lastMod = f[0].lastModified;
          status("Saved " + e.name + " and HTML.", "ok");
        } catch (e) {
          status("Save failed: " + e.message, "err");
        } finally {
          busy = false;
          if (queued) {
            queued = false;
            scheduleAutoSave();
          }
        }
      }
      let startOffset = Number(localStorage.getItem(OFFSET_KEY)) || 0;
      loadWeek(startOffset);
      (async () => {
        try {
          dir = await getHandle();
          if (dir)
            status(
              (await allowed(dir, false))
                ? "Ready."
                : "Press save or refresh to restore folder access.",
              "ok",
            );
        } catch (e) {}
      })();
    </script>
  </body>
</html>
