<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weekly Time Tracker</title><script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script><style>body{background:#0b0c10;color:#fff;font-family:-apple-system,Segoe UI,sans-serif;padding:20px}table{width:80%;margin:auto;table-layout:fixed;border-collapse:collapse;background:#17181c}th,td{border:1px solid #2f3138;padding:8px;text-align:center;vertical-align:middle}th:first-child,td:first-child{width:110px}input{width:58px;text-align:center;background:#2a2d34;color:#fff;border:0;border-radius:8px;padding:6px;font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em}.pos{color:#30d158}.neg{color:#ff453a}.zero{color:#8e8e93}.time-stack{font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em;white-space:pre}.actions{display:flex;justify-content:space-between;width:80%;margin:15px auto 0}.btn{padding:10px 18px;background:#3a3d45;color:#fff;border:1px solid #4a4d55;border-radius:10px}.btn:hover{background:#4a4d55}.corner-hidden{border:none!important;background:#0b0c10!important;box-shadow:none!important}thead th:nth-child(2){border-left:1px solid #2f3138!important}tbody tr:first-child td:first-child{border-top:1px solid #2f3138!important}.day-head{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15}.this-week-btn{padding:3px 9px;margin:0 0 5px;font-size:10px;border-radius:7px}.save-status{width:80%;margin:10px auto 0;text-align:right;color:#a7abb5;font-size:12px}.save-status.ok{color:#30d158}.save-status.err{color:#ff453a}</style></head><body><div style="width:80%;margin:0 auto 10px;display:grid;grid-template-columns:110px repeat(5,1fr);align-items:center"><button id='prevWeek' class='btn' style="grid-column:1;justify-self:start;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">‹</button><button id='thisWeek' class='btn' style="grid-column:2;justify-self:center;padding:4px 12px;font-size:11px;border-radius:8px">This week</button><h2 style='grid-column:3 / 6;grid-row:1;margin:0;text-align:center'>Weekly Time Tracker</h2><button id='nextWeek' class='btn' style="grid-column:6;grid-row:1;justify-self:end;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">›</button></div><table id='tbl'><thead><tr><th class='corner-hidden'></th><th id='a0'></th><th id='a1'></th><th id='a2'></th><th id='a3'></th><th id='a4'></th></tr></thead><tbody><tr><td>Clock In</td></tr><tr><td>Lunch Out</td></tr><tr><td>Lunch In</td></tr><tr><td>Clock Out</td></tr><tr><td>Daily Balance</td></tr><tr><td>Progress</td></tr></tbody></table><div class='actions'><button class='btn' onclick='fillTheoretical()'>Fill with Theoretical Hours</button><div><button id='folderBtn' class='btn' onclick='selectSaveFolder()'>Select OneDrive Folder</button> <button id='loadBtn' class='btn' onclick='loadFromExcel()'>Load from Excel</button> <button id='saveBtn' class='btn' onclick='saveFile()'>Save</button></div></div><div id='saveStatus' class='save-status'>Select your local OneDrive folder once</div><script>const days=['Mo','Tu','We','Th','Fr'];const b=document.querySelector('tbody');for(let r=0;r<4;r++){for(let d=0;d<5;d++){let td=document.createElement('td');td.innerHTML='<input>';b.rows[r].appendChild(td)}}for(let r=4;r<6;r++){for(let d=0;d<5;d++)b.rows[r].appendChild(document.createElement('td'))}let m=new Date();m.setDate(m.getDate()-((m.getDay()+6)%7));let weekOffset=0;const STORAGE_KEY='wttWeeksData';const OFFSET_KEY='wttWeekOffset';let weeksData=(window.__PRESET_WEEKS_DATA__||{});try{weeksData=JSON.parse(localStorage.getItem(STORAGE_KEY))||weeksData}catch(e){}function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(weeksData))}catch(e){}}function mondayFor(off){let d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7)+off*7);return d}function weekKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function saveCurrentWeek(){const key=weekKey(mondayFor(weekOffset));const vals=[];for(let r=0;r<4;r++){const row=[];for(let c=0;c<5;c++)row.push(b.rows[r].cells[c+1].firstChild.value);vals.push(row)}weeksData[key]=vals;persist()}function loadWeek(off){weekOffset=off;try{localStorage.setItem(OFFSET_KEY,String(off))}catch(e){}const mon=mondayFor(weekOffset);const key=weekKey(mon);const vals=weeksData[key];for(let i=0;i<5;i++){let d=new Date(mon);d.setDate(mon.getDate()+i);document.getElementById('a'+i).innerHTML="<div class='day-head'><span>"+days[i]+"</span><small>"+d.getDate()+'-'+d.toLocaleString('en',{month:'long'}).toLowerCase()+"</small></div>"}for(let r=0;r<4;r++)for(let c=0;c<5;c++)b.rows[r].cells[c+1].firstChild.value=vals?vals[r][c]:'';calc()}function commitInputs(){document.querySelectorAll('input').forEach(i=>{i.value=norm(i.value)})}document.getElementById('prevWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset-1)});document.getElementById('nextWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset+1)});document.addEventListener('click',e=>{if(e.target&&e.target.id==='thisWeek'){commitInputs();calc();loadWeek(0)}});function norm(v){v=(v||'').replace(/\D/g,'');if(!v)return'';let h,m;if(v.length<=2){h=+v;m=0}else if(v.length===3){h=+v[0];m=+v.slice(1)}else{h=+v.slice(0,-2);m=+v.slice(-2)}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}function mins(t,pm=false){if(!t)return null;let[a,b]=t.split(':').map(Number);if(pm&&a<12)a+=12;return a*60+b}function hm(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}function hmv(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}document.querySelectorAll('input').forEach(i=>i.addEventListener('change',e=>{e.target.value=norm(e.target.value);calc();scheduleAutoSave()}));function calc(){saveCurrentWeek();let cum=0;for(let c=0;c<5;c++){let ci=mins(b.rows[0].cells[c+1].firstChild.value,false);let lo=mins(b.rows[1].cells[c+1].firstChild.value,true);let li=mins(b.rows[2].cells[c+1].firstChild.value,true);let co=mins(b.rows[3].cells[c+1].firstChild.value,true);let h=0;if(ci!=null&&co!=null){if(lo!=null&&li!=null){h=((lo-ci)+(co-li))/60;}else{h=(co-ci)/60;}}cum+=h;let bal=h-7;b.rows[4].cells[c+1].innerHTML=h?`<div class='time-stack'>${hmv(h)}<br><span class='${bal>0?'pos':(bal<0?'neg':'zero')}'>${hm(bal)}</span></div>`:'';let prog=cum-((c+1)*7);b.rows[5].cells[c+1].innerHTML=`<div class='time-stack'>${hmv(cum)}<br><span class='${prog>0?'pos':(prog<0?'neg':'zero')}'>${hm(prog)}</span></div>`;}}function fillTheoretical(){for(let c=1;c<=5;c++){b.rows[0].cells[c].firstChild.value='09:00';b.rows[1].cells[c].firstChild.value='';b.rows[2].cells[c].firstChild.value='';b.rows[3].cells[c].firstChild.value='04:00';}calc();scheduleAutoSave()}document.querySelectorAll('input').forEach((inp)=>{inp.addEventListener('keydown',e=>{const inputs=[...document.querySelectorAll('input')];const idx=inputs.indexOf(e.target);const col=idx%5;const row=Math.floor(idx/5);const go=(r,c)=>{if(r>=0&&r<4&&c>=0&&c<5){const target=inputs[r*5+c];target.focus();target.select();}};if(e.key==='Enter'){e.preventDefault();if(e.shiftKey)go(row-1,col);else if(row<3)go(row+1,col);else if(col<4)go(0,col+1);}else if(e.key==='ArrowUp'){e.preventDefault();go(row-1,col);}else if(e.key==='ArrowDown'){e.preventDefault();go(row+1,col);}else if(e.key==='ArrowLeft'){e.preventDefault();go(row,col-1);}else if(e.key==='ArrowRight'){e.preventDefault();go(row,col+1);}});});let startOffset=(typeof window.__PRESET_OFFSET__==='number'?window.__PRESET_OFFSET__:0);try{const so=parseInt(localStorage.getItem(OFFSET_KEY),10);if(!isNaN(so))startOffset=so}catch(e){}const hadData=!!weeksData[weekKey(mondayFor(startOffset))];loadWeek(startOffset);if(!hadData)fillTheoretical();const DB_NAME='weeklyTimeTrackerDB',DB_STORE='handles',DIR_KEY='saveDirectory';
const BLOCK_FIRST_ROW=2,BLOCK_STEP=10;
let saveDirectoryHandle=null,saveTimer=null,saveBusy=false,saveQueued=false,lastExcelModified=0;
function setSaveStatus(message,kind=''){const el=document.getElementById('saveStatus');if(!el)return;el.textContent=message;el.className='save-status'+(kind?' '+kind:'')}
function openHandleDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=()=>{if(!req.result.objectStoreNames.contains(DB_STORE))req.result.createObjectStore(DB_STORE)};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
async function storeHandle(handle){const db=await openHandleDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(handle,DIR_KEY);tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>{db.close();reject(tx.error)}})}
async function loadHandle(){const db=await openHandleDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DB_STORE,'readonly'),req=tx.objectStore(DB_STORE).get(DIR_KEY);req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>reject(req.error);tx.oncomplete=()=>db.close()})}
async function hasPermission(handle,request=false){if(!handle)return false;const opts={mode:'readwrite'};if((await handle.queryPermission(opts))==='granted')return true;return request&&(await handle.requestPermission(opts))==='granted'}
async function selectSaveFolder(){if(!('showDirectoryPicker' in window)){setSaveStatus('This browser does not support folder access. Use Microsoft Edge or Chrome.','err');return false}try{saveDirectoryHandle=await window.showDirectoryPicker({id:'weekly-time-tracker',mode:'readwrite'});await storeHandle(saveDirectoryHandle);document.getElementById('folderBtn').textContent='Change Save Folder';setSaveStatus('Folder selected: '+saveDirectoryHandle.name,'ok');await loadFromExcel(true);return true}catch(e){if(e.name!=='AbortError')setSaveStatus('Folder selection failed: '+(e.message||e),'err');return false}}
async function ensureSaveDirectory(interactive=true){if(!saveDirectoryHandle)saveDirectoryHandle=await loadHandle();if(saveDirectoryHandle&&await hasPermission(saveDirectoryHandle,interactive)){document.getElementById('folderBtn').textContent='Change Save Folder';return true}if(interactive)return await selectSaveFolder();return false}
function pad2(n){return String(n).padStart(2,'0')}
function monthSheetName(mon){return mon.getFullYear()+'-'+pad2(mon.getMonth()+1)}
function annualFileName(mon){return 'weekly_time_tracker_'+mon.getFullYear()+'.xlsx'}
function parseWeekMonday(key){const p=key.split('-').map(Number);return new Date(p[0],p[1]-1,p[2],12)}
function weekDates(mon){return Array.from({length:5},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d})}
function thinBorder(){const edge={style:'thin',color:{argb:'FF000000'}};return{top:edge,left:edge,bottom:edge,right:edge}}
function excelSerialTime(text){if(!text)return null;const [h,m]=text.split(':').map(Number);return(h*60+m)/1440}
function excelTimeText(value){if(value==null||value==='')return'';let fraction=null;if(typeof value==='number')fraction=((value%1)+1)%1;else if(value instanceof Date)fraction=(value.getUTCHours()*60+value.getUTCMinutes())/1440;else if(typeof value==='string'){const match=value.match(/(\d{1,2}):(\d{2})/);if(match)fraction=(+match[1]*60 + +match[2])/1440}if(fraction==null)return'';const total=Math.round(fraction*1440)%1440;return pad2(Math.floor(total/60))+':'+pad2(total%60)}
function normalizeExcelDate(value){if(value instanceof Date)return new Date(value.getUTCFullYear(),value.getUTCMonth(),value.getUTCDate(),12);if(typeof value==='number'){const epoch=Date.UTC(1899,11,30);const d=new Date(epoch+Math.round(value*86400000));return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),12)}if(typeof value==='string'){const d=new Date(value);if(!isNaN(d))return new Date(d.getFullYear(),d.getMonth(),d.getDate(),12)}return null}
function readWeeksFromWorkbook(wb){const found={};for(const ws of wb.worksheets){for(let start=BLOCK_FIRST_ROW;start<=Math.max(ws.rowCount,BLOCK_FIRST_ROW);start+=BLOCK_STEP){const monday=normalizeExcelDate(ws.getCell(start+1,3).value);if(!monday)continue;const vals=Array.from({length:4},(_,r)=>Array.from({length:5},(_,c)=>excelTimeText(ws.getCell(start+2+r,c+3).value)));found[weekKey(monday)]=vals}}return found}
function styleHeader(cell){cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD0CECE'}};cell.font={name:'Aptos',size:14,bold:true,color:{argb:'FF000000'}};cell.alignment={horizontal:'center',vertical:'middle'};cell.border=thinBorder()}
function styleLabel(cell){cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD0CECE'}};cell.font={name:'Aptos',size:12,bold:true,color:{argb:'FF000000'}};cell.alignment={horizontal:'center',vertical:'middle'};cell.border=thinBorder()}
function signedTimeFormat(){return'[Green]+[h]:mm;[Red]-[h]:mm;[Color16]0:00'}
function setFormula(cell,formula){cell.value={formula};cell.numFmt=signedTimeFormat();cell.font={name:'Aptos',size:12,bold:true,color:{argb:'FF000000'}};cell.alignment={horizontal:'center',vertical:'middle'};cell.border=thinBorder()}
function addWeekBlock(ws,start,mon,vals){const dates=weekDates(mon);ws.getRow(start).height=24;ws.getRow(start+1).height=24;for(let c=2;c<=7;c++){styleHeader(ws.getCell(start,c));styleHeader(ws.getCell(start+1,c))}ws.getCell(start,2).value='';ws.getCell(start+1,2).value='';for(let c=0;c<5;c++){ws.getCell(start,c+3).value=days[c];ws.getCell(start+1,c+3).value=dates[c];ws.getCell(start+1,c+3).numFmt='dd-mmm'}const labels=['Clock in','Lunch out','Lunch in','Clock out','Daily Balance','Progress'];for(let r=0;r<6;r++){const row=start+2+r;ws.getRow(row).height=24;styleLabel(ws.getCell(row,2));ws.getCell(row,2).value=labels[r];for(let c=0;c<5;c++){const cell=ws.getCell(row,c+3);cell.border=thinBorder();cell.alignment={horizontal:'center',vertical:'middle'};if(r<4){cell.value=excelSerialTime(vals?.[r]?.[c]||'');cell.numFmt='h:mm';cell.font={name:'Aptos',size:12,color:{argb:'FF000000'}};if(cell.value==null)cell.value='';}}}for(let c=3;c<=7;c++){const L=ws.getCell(start+2,c).address,LO=ws.getCell(start+3,c).address,LI=ws.getCell(start+4,c).address,CO=ws.getCell(start+5,c).address,DB=ws.getCell(start+6,c);const worked=`IF(AND(${L}<>\"\",${CO}<>\"\"),IF(AND(${LO}<>\"\",${LI}<>\"\"),(${LO}+IF(${LO}<TIME(12,0,0),0.5,0)-${L})+(${CO}+IF(${CO}<TIME(12,0,0),0.5,0)-(${LI}+IF(${LI}<TIME(12,0,0),0.5,0))),${CO}+IF(${CO}<TIME(12,0,0),0.5,0)-${L})-TIME(7,0,0),\"\")`;setFormula(DB,worked);const firstDB=ws.getCell(start+6,3).address,currentDB=DB.address;setFormula(ws.getCell(start+7,c),`IF(COUNT(${firstDB}:${currentDB})=0,\"\",SUM(${firstDB}:${currentDB}))`)}}
function clearWorksheet(ws){if(ws.rowCount)ws.spliceRows(1,ws.rowCount);ws.columns=[]}
function buildMonthSheet(ws,monthMon){clearWorksheet(ws);ws.getColumn(1).width=3;ws.getColumn(2).width=19;for(let c=3;c<=7;c++)ws.getColumn(c).width=14;ws.properties.defaultRowHeight=20;ws.views=[{showGridLines:true}];ws.pageSetup={orientation:'landscape',paperSize:9,fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.3,right:0.3,top:0.4,bottom:0.4,header:0.2,footer:0.2}};const month=monthSheetName(monthMon);const entries=Object.entries(weeksData).map(([key,vals])=>({mon:parseWeekMonday(key),vals})).filter(x=>monthSheetName(x.mon)===month).sort((a,b)=>a.mon-b.mon);entries.forEach((entry,i)=>addWeekBlock(ws,BLOCK_FIRST_ROW+i*BLOCK_STEP,entry.mon,entry.vals));ws.printArea=entries.length?`B2:G${BLOCK_FIRST_ROW+(entries.length-1)*BLOCK_STEP+7}`:'B2:G9'}
async function getAnnualFile(mon,create=false){try{return await saveDirectoryHandle.getFileHandle(annualFileName(mon),{create})}catch(e){if(e.name==='NotFoundError')return null;throw e}}
async function loadAnnualWorkbook(mon){const wb=new ExcelJS.Workbook(),handle=await getAnnualFile(mon,false);if(handle){const file=await handle.getFile();lastExcelModified=file.lastModified;if(file.size)await wb.xlsx.load(await file.arrayBuffer())}return wb}
async function loadFromExcel(silent=false){if(!await ensureSaveDirectory(!silent))return false;if(typeof ExcelJS==='undefined'){setSaveStatus('Excel library could not be loaded.','err');return false}try{const mon=mondayFor(weekOffset),handle=await getAnnualFile(mon,false);if(!handle){setSaveStatus('No annual Excel file exists yet. Press Save to create it.');return false}const file=await handle.getFile(),wb=new ExcelJS.Workbook();await wb.xlsx.load(await file.arrayBuffer());const imported=readWeeksFromWorkbook(wb);Object.assign(weeksData,imported);persist();lastExcelModified=file.lastModified;loadWeek(weekOffset);setSaveStatus('Loaded '+Object.keys(imported).length+' week(s) from '+annualFileName(mon),'ok');return true}catch(e){setSaveStatus('Load from Excel failed: '+(e.message||e),'err');if(!silent)alert('The Excel file could not be loaded.\n\n'+(e.message||e));return false}}
async function annualExcelBlob(){if(typeof ExcelJS==='undefined')throw new Error('Excel library could not be loaded.');const currentMon=mondayFor(weekOffset),wb=await loadAnnualWorkbook(currentMon);const imported=readWeeksFromWorkbook(wb),currentKey=weekKey(currentMon);for(const [key,vals] of Object.entries(imported))if(key!==currentKey)weeksData[key]=vals;const sheetName=monthSheetName(currentMon);let ws=wb.getWorksheet(sheetName);const priorState=ws?ws.state:'visible';if(!ws)ws=wb.addWorksheet(sheetName);buildMonthSheet(ws,currentMon);ws.state=priorState||'visible';if(!wb.worksheets.some(sheet=>sheet.state==='visible'))ws.state='visible';wb.calcProperties.fullCalcOnLoad=true;wb.calcProperties.forceFullCalc=true;wb.calcProperties.calcMode='auto';const buffer=await wb.xlsx.writeBuffer();return{fileName:annualFileName(currentMon),blob:new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})}}
function htmlSnapshotBlob(){const clone=document.documentElement.cloneNode(true),old=clone.querySelector('#snapshotData');if(old)old.remove();const snapshot=document.createElement('script');snapshot.id='snapshotData';snapshot.textContent='window.__PRESET_WEEKS_DATA__='+JSON.stringify(weeksData)+';window.__PRESET_OFFSET__='+JSON.stringify(weekOffset)+';';const main=[...clone.querySelectorAll('script')].find(el=>el.textContent.trim().startsWith('const days='));if(main)main.parentNode.insertBefore(snapshot,main);else clone.querySelector('head').appendChild(snapshot);return new Blob(['<!DOCTYPE html>\n'+clone.outerHTML],{type:'text/html;charset=utf-8'})}
async function writeBlob(name,blob){const file=await saveDirectoryHandle.getFileHandle(name,{create:true}),writable=await file.createWritable();await writable.write(blob);await writable.close();return await file.getFile()}
function scheduleAutoSave(){clearTimeout(saveTimer);if(!saveDirectoryHandle)return;setSaveStatus('Changes pending...');saveTimer=setTimeout(()=>saveFile(true),1500)}
async function saveFile(automatic=false){if(saveBusy){saveQueued=true;return}if(!await ensureSaveDirectory(!automatic)){if(automatic)setSaveStatus('Press Save to restore folder permission.','err');return}saveBusy=true;saveQueued=false;try{commitInputs();calc();const mon=mondayFor(weekOffset),existing=await getAnnualFile(mon,false);if(existing&&lastExcelModified){const disk=await existing.getFile();if(disk.lastModified>lastExcelModified){setSaveStatus('Excel changed outside the tracker. Press Load from Excel before saving.','err');if(!automatic)alert('The Excel file has changed since it was last loaded. Use Load from Excel first to avoid overwriting those changes.');return}}setSaveStatus('Saving HTML and annual Excel workbook...');const excel=await annualExcelBlob(),html=htmlSnapshotBlob();const files=await Promise.all([writeBlob(excel.fileName,excel.blob),writeBlob('weekly_time_tracker.html',html)]);lastExcelModified=files[0].lastModified;persist();setSaveStatus('Saved '+excel.fileName+' and HTML at '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · OneDrive will sync the folder','ok')}catch(e){setSaveStatus('Save failed: '+(e.message||e),'err');if(!automatic)alert('The files could not be saved.\n\n'+(e.message||e))}finally{saveBusy=false;if(saveQueued){saveQueued=false;scheduleAutoSave()}}}
(async()=>{if(location.protocol==='file:')setSaveStatus('Open this page from GitHub Pages, not as a file:// URL.','err');try{saveDirectoryHandle=await loadHandle();if(saveDirectoryHandle){document.getElementById('folderBtn').textContent='Change Save Folder';if(await hasPermission(saveDirectoryHandle,false))setSaveStatus('Ready. Use Load from Excel to import changes made in Excel.','ok');else setSaveStatus('Press Save or Load from Excel to restore folder access.')}}catch(e){}})();
</script></body></html>
