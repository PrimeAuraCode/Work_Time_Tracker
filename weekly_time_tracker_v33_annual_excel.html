<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weekly Time Tracker</title><script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script><style>body{background:#0b0c10;color:#fff;font-family:-apple-system,Segoe UI,sans-serif;padding:20px}table{width:80%;margin:auto;table-layout:fixed;border-collapse:collapse;background:#17181c}th,td{border:1px solid #2f3138;padding:8px;text-align:center;vertical-align:middle}th:first-child,td:first-child{width:110px}input{width:58px;text-align:center;background:#2a2d34;color:#fff;border:0;border-radius:8px;padding:6px;font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em}.pos{color:#30d158}.neg{color:#ff453a}.zero{color:#8e8e93}.time-stack{font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em;white-space:pre}.actions{display:flex;justify-content:space-between;width:80%;margin:15px auto 0}.btn{padding:10px 18px;background:#3a3d45;color:#fff;border:1px solid #4a4d55;border-radius:10px}.btn:hover{background:#4a4d55}.corner-hidden{border:none!important;background:#0b0c10!important;box-shadow:none!important}thead th:nth-child(2){border-left:1px solid #2f3138!important}tbody tr:first-child td:first-child{border-top:1px solid #2f3138!important}.day-head{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15}.this-week-btn{padding:3px 9px;margin:0 0 5px;font-size:10px;border-radius:7px}.save-status{width:80%;margin:10px auto 0;text-align:right;color:#a7abb5;font-size:12px}.save-status.ok{color:#30d158}.save-status.err{color:#ff453a}</style></head><body><div style="width:80%;margin:0 auto 10px;display:grid;grid-template-columns:110px repeat(5,1fr);align-items:center"><button id='prevWeek' class='btn' style="grid-column:1;justify-self:start;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">‹</button><button id='thisWeek' class='btn' style="grid-column:2;justify-self:center;padding:4px 12px;font-size:11px;border-radius:8px">This week</button><h2 style='grid-column:3 / 6;grid-row:1;margin:0;text-align:center'>Weekly Time Tracker</h2><button id='nextWeek' class='btn' style="grid-column:6;grid-row:1;justify-self:end;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">›</button></div><table id='tbl'><thead><tr><th class='corner-hidden'></th><th id='a0'></th><th id='a1'></th><th id='a2'></th><th id='a3'></th><th id='a4'></th></tr></thead><tbody><tr><td>Clock In</td></tr><tr><td>Lunch Out</td></tr><tr><td>Lunch In</td></tr><tr><td>Clock Out</td></tr><tr><td>Daily Balance</td></tr><tr><td>Progress</td></tr></tbody></table><div class='actions'><button class='btn' onclick='fillTheoretical()'>Fill with Theoretical Hours</button><div><button id='folderBtn' class='btn' onclick='selectSaveFolder()'>Select OneDrive Folder</button> <button id='saveBtn' class='btn' onclick='saveFile()'>Save</button></div></div><div id='saveStatus' class='save-status'>Select your local OneDrive folder once</div><script>const days=['Mo','Tu','We','Th','Fr'];const b=document.querySelector('tbody');for(let r=0;r<4;r++){for(let d=0;d<5;d++){let td=document.createElement('td');td.innerHTML='<input>';b.rows[r].appendChild(td)}}for(let r=4;r<6;r++){for(let d=0;d<5;d++)b.rows[r].appendChild(document.createElement('td'))}let m=new Date();m.setDate(m.getDate()-((m.getDay()+6)%7));let weekOffset=0;const STORAGE_KEY='wttWeeksData';const OFFSET_KEY='wttWeekOffset';let weeksData=(window.__PRESET_WEEKS_DATA__||{});try{weeksData=JSON.parse(localStorage.getItem(STORAGE_KEY))||weeksData}catch(e){}function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(weeksData))}catch(e){}}function mondayFor(off){let d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7)+off*7);return d}function weekKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function saveCurrentWeek(){const key=weekKey(mondayFor(weekOffset));const vals=[];for(let r=0;r<4;r++){const row=[];for(let c=0;c<5;c++)row.push(b.rows[r].cells[c+1].firstChild.value);vals.push(row)}weeksData[key]=vals;persist()}function loadWeek(off){weekOffset=off;try{localStorage.setItem(OFFSET_KEY,String(off))}catch(e){}const mon=mondayFor(weekOffset);const key=weekKey(mon);const vals=weeksData[key];for(let i=0;i<5;i++){let d=new Date(mon);d.setDate(mon.getDate()+i);document.getElementById('a'+i).innerHTML="<div class='day-head'><span>"+days[i]+"</span><small>"+d.getDate()+'-'+d.toLocaleString('en',{month:'long'}).toLowerCase()+"</small></div>"}for(let r=0;r<4;r++)for(let c=0;c<5;c++)b.rows[r].cells[c+1].firstChild.value=vals?vals[r][c]:'';calc()}function commitInputs(){document.querySelectorAll('input').forEach(i=>{i.value=norm(i.value)})}document.getElementById('prevWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset-1)});document.getElementById('nextWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset+1)});document.addEventListener('click',e=>{if(e.target&&e.target.id==='thisWeek'){commitInputs();calc();loadWeek(0)}});function norm(v){v=(v||'').replace(/\D/g,'');if(!v)return'';let h,m;if(v.length<=2){h=+v;m=0}else if(v.length===3){h=+v[0];m=+v.slice(1)}else{h=+v.slice(0,-2);m=+v.slice(-2)}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}function mins(t,pm=false){if(!t)return null;let[a,b]=t.split(':').map(Number);if(pm&&a<12)a+=12;return a*60+b}function hm(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}function hmv(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}document.querySelectorAll('input').forEach(i=>i.addEventListener('change',e=>{e.target.value=norm(e.target.value);calc();scheduleAutoSave()}));function calc(){saveCurrentWeek();let cum=0;for(let c=0;c<5;c++){let ci=mins(b.rows[0].cells[c+1].firstChild.value,false);let lo=mins(b.rows[1].cells[c+1].firstChild.value,true);let li=mins(b.rows[2].cells[c+1].firstChild.value,true);let co=mins(b.rows[3].cells[c+1].firstChild.value,true);let h=0;if(ci!=null&&co!=null){if(lo!=null&&li!=null){h=((lo-ci)+(co-li))/60;}else{h=(co-ci)/60;}}cum+=h;let bal=h-7;b.rows[4].cells[c+1].innerHTML=h?`<div class='time-stack'>${hmv(h)}<br><span class='${bal>0?'pos':(bal<0?'neg':'zero')}'>${hm(bal)}</span></div>`:'';let prog=cum-((c+1)*7);b.rows[5].cells[c+1].innerHTML=`<div class='time-stack'>${hmv(cum)}<br><span class='${prog>0?'pos':(prog<0?'neg':'zero')}'>${hm(prog)}</span></div>`;}}function fillTheoretical(){for(let c=1;c<=5;c++){b.rows[0].cells[c].firstChild.value='09:00';b.rows[1].cells[c].firstChild.value='';b.rows[2].cells[c].firstChild.value='';b.rows[3].cells[c].firstChild.value='04:00';}calc();scheduleAutoSave()}document.querySelectorAll('input').forEach((inp)=>{inp.addEventListener('keydown',e=>{const inputs=[...document.querySelectorAll('input')];const idx=inputs.indexOf(e.target);const col=idx%5;const row=Math.floor(idx/5);const go=(r,c)=>{if(r>=0&&r<4&&c>=0&&c<5){const target=inputs[r*5+c];target.focus();target.select();}};if(e.key==='Enter'){e.preventDefault();if(e.shiftKey)go(row-1,col);else if(row<3)go(row+1,col);else if(col<4)go(0,col+1);}else if(e.key==='ArrowUp'){e.preventDefault();go(row-1,col);}else if(e.key==='ArrowDown'){e.preventDefault();go(row+1,col);}else if(e.key==='ArrowLeft'){e.preventDefault();go(row,col-1);}else if(e.key==='ArrowRight'){e.preventDefault();go(row,col+1);}});});let startOffset=(typeof window.__PRESET_OFFSET__==='number'?window.__PRESET_OFFSET__:0);try{const so=parseInt(localStorage.getItem(OFFSET_KEY),10);if(!isNaN(so))startOffset=so}catch(e){}const hadData=!!weeksData[weekKey(mondayFor(startOffset))];loadWeek(startOffset);if(!hadData)fillTheoretical();const DB_NAME='weeklyTimeTrackerDB',DB_STORE='handles',DIR_KEY='saveDirectory';
let saveDirectoryHandle=null,saveTimer=null,saveBusy=false,saveQueued=false;
function setSaveStatus(message,kind=''){const el=document.getElementById('saveStatus');if(!el)return;el.textContent=message;el.className='save-status'+(kind?' '+kind:'')}
function openHandleDB(){return new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=()=>{if(!req.result.objectStoreNames.contains(DB_STORE))req.result.createObjectStore(DB_STORE)};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)})}
async function storeHandle(handle){const db=await openHandleDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(handle,DIR_KEY);tx.oncomplete=()=>{db.close();resolve()};tx.onerror=()=>{db.close();reject(tx.error)}})}
async function loadHandle(){const db=await openHandleDB();return new Promise((resolve,reject)=>{const tx=db.transaction(DB_STORE,'readonly'),req=tx.objectStore(DB_STORE).get(DIR_KEY);req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>reject(req.error);tx.oncomplete=()=>db.close()})}
async function hasPermission(handle,request=false){if(!handle)return false;const opts={mode:'readwrite'};if((await handle.queryPermission(opts))==='granted')return true;return request&&(await handle.requestPermission(opts))==='granted'}
async function selectSaveFolder(){if(!('showDirectoryPicker' in window)){setSaveStatus('This browser does not support folder access. Use Microsoft Edge or Chrome.','err');return false}try{const handle=await window.showDirectoryPicker({id:'weekly-time-tracker',mode:'readwrite'});saveDirectoryHandle=handle;await storeHandle(handle);document.getElementById('folderBtn').textContent='Change Save Folder';setSaveStatus('Folder selected: '+handle.name,'ok');return true}catch(e){if(e.name!=='AbortError')setSaveStatus('Folder selection failed: '+(e.message||e),'err');return false}}
async function ensureSaveDirectory(interactive=true){if(!saveDirectoryHandle)saveDirectoryHandle=await loadHandle();if(saveDirectoryHandle&&await hasPermission(saveDirectoryHandle,interactive)){document.getElementById('folderBtn').textContent='Change Save Folder';return true}if(interactive)return await selectSaveFolder();return false}
function pad2(n){return String(n).padStart(2,'0')}
function monthSheetName(mon){return mon.getFullYear()+'-'+pad2(mon.getMonth()+1)}
function annualFileName(mon){return 'weekly_time_tracker_'+mon.getFullYear()+'.xlsx'}
function parseWeekMonday(key){const parts=key.split('-').map(Number);return new Date(parts[0],parts[1]-1,parts[2],12,0,0,0)}
function weekDates(mon){return Array.from({length:5},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d})}
function computeWeek(vals){const result=[],toMins=(t,pm=false)=>{if(!t)return null;let [h,m]=t.split(':').map(Number);if(pm&&h<12)h+=12;return h*60+m},fmt=(total)=>{const v=Math.abs(Math.round(total));return pad2(Math.floor(v/60))+':'+pad2(v%60)};let cum=0;for(let c=0;c<5;c++){const ci=toMins(vals?.[0]?.[c],false),lo=toMins(vals?.[1]?.[c],true),li=toMins(vals?.[2]?.[c],true),co=toMins(vals?.[3]?.[c],true);let worked=0;if(ci!=null&&co!=null)worked=lo!=null&&li!=null?(lo-ci)+(co-li):co-ci;cum+=worked;result.push({hasWorked:ci!=null&&co!=null,worked,dayBalance:worked-420,cumulative:cum,progress:cum-(c+1)*420,fmt})}return result}
function borderStyle(){return{top:{style:'thin',color:{argb:'FFD0D0D0'}},left:{style:'thin',color:{argb:'FFD0D0D0'}},bottom:{style:'thin',color:{argb:'FFD0D0D0'}},right:{style:'thin',color:{argb:'FFD0D0D0'}}}}
function colorFor(value){return value>0?'FF248A3D':value<0?'FFD32F2F':'FF80868B'}
function richTime(primary,balance){return{richText:[{text:primary+'\n',font:{name:'Aptos',size:11,color:{argb:'FF202124'}}},{text:balance,font:{name:'Aptos',size:11,bold:true,color:{argb:colorFor(balance.raw)}}}]}}
function clearWorksheet(ws){if(ws.rowCount>0)ws.spliceRows(1,ws.rowCount);ws.columns=[];ws.mergedCells&&Object.keys(ws.mergedCells).forEach(()=>{});}
function buildMonthSheet(ws,monthMon){clearWorksheet(ws);ws.properties.defaultRowHeight=20;ws.getColumn(1).width=19;for(let c=2;c<=6;c++)ws.getColumn(c).width=15;ws.views=[{state:'frozen',xSplit:1,ySplit:0}];ws.pageSetup={orientation:'landscape',paperSize:9,fitToPage:true,fitToWidth:1,fitToHeight:0,margins:{left:0.3,right:0.3,top:0.5,bottom:0.5,header:0.2,footer:0.2}};const monthName=monthSheetName(monthMon);const weekEntries=Object.entries(weeksData).map(([key,vals])=>({key,mon:parseWeekMonday(key),vals})).filter(x=>monthSheetName(x.mon)===monthName).sort((a,b)=>a.mon-b.mon);let row=1;for(const entry of weekEntries){const dates=weekDates(entry.mon),calcData=computeWeek(entry.vals);const dayRow=ws.getRow(row),dateRow=ws.getRow(row+1);dayRow.getCell(1).value='';dateRow.getCell(1).value='';for(let c=0;c<5;c++){dayRow.getCell(c+2).value=days[c];dateRow.getCell(c+2).value=dates[c];dateRow.getCell(c+2).numFmt='dd-mmm';}for(const r of [dayRow,dateRow]){r.height=22;for(let c=1;c<=6;c++){const cell=r.getCell(c);cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFE6E6E6'}};cell.font={name:'Aptos',size:11,bold:true,color:{argb:'FF202124'}};cell.alignment={horizontal:'center',vertical:'middle'};cell.border=borderStyle();}}const labels=['Clock In','Lunch Out','Lunch In','Clock Out','Daily Balance','Progress'];for(let r=0;r<labels.length;r++){const excelRow=ws.getRow(row+2+r);excelRow.height=r>=4?34:24;const label=excelRow.getCell(1);label.value=labels[r];label.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};label.font={name:'Aptos',size:11,bold:true,color:{argb:'FF202124'}};label.alignment={horizontal:'left',vertical:'middle'};label.border=borderStyle();for(let c=0;c<5;c++){const cell=excelRow.getCell(c+2);cell.border=borderStyle();cell.alignment={horizontal:'center',vertical:'middle',wrapText:true};cell.font={name:'Aptos',size:11,color:{argb:'FF202124'}};if(r<4){cell.value=entry.vals?.[r]?.[c]||'';}else if(r===4){if(calcData[c].hasWorked)cell.value=richTime(calcData[c].fmt(calcData[c].worked),{toString(){return calcData[c].fmt(calcData[c].dayBalance)},raw:calcData[c].dayBalance});else cell.value='';}else{cell.value=richTime(calcData[c].fmt(calcData[c].cumulative),{toString(){return calcData[c].fmt(calcData[c].progress)},raw:calcData[c].progress});}}}row+=9;}if(!weekEntries.length){ws.getCell('A1').value='No weeks saved for '+monthName;ws.getCell('A1').font={name:'Aptos',italic:true,color:{argb:'FF80868B'}}}ws.printArea='A1:F'+Math.max(1,row-1)}
async function loadAnnualWorkbook(fileName){const wb=new ExcelJS.Workbook();try{const handle=await saveDirectoryHandle.getFileHandle(fileName);const file=await handle.getFile();if(file.size>0)await wb.xlsx.load(await file.arrayBuffer())}catch(e){if(e.name!=='NotFoundError')throw e}return wb}
async function annualExcelBlob(){if(typeof ExcelJS==='undefined')throw new Error('Excel library could not be loaded.');const mon=mondayFor(weekOffset),fileName=annualFileName(mon),wb=await loadAnnualWorkbook(fileName),sheetName=monthSheetName(mon);let ws=wb.getWorksheet(sheetName);const previousState=ws?ws.state:'visible';if(!ws)ws=wb.addWorksheet(sheetName);buildMonthSheet(ws,mon);ws.state=previousState||'visible';if(!wb.worksheets.some(sheet=>sheet.state==='visible'))ws.state='visible';const ordered=[...wb.worksheets].sort((a,b)=>a.name.localeCompare(b.name));ordered.forEach((sheet,index)=>sheet.orderNo=index+1);const buffer=await wb.xlsx.writeBuffer();return{fileName,blob:new Blob([buffer],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})}}
function htmlSnapshotBlob(){const clone=document.documentElement.cloneNode(true),old=clone.querySelector('#snapshotData');if(old)old.remove();const snapshot=document.createElement('script');snapshot.id='snapshotData';snapshot.textContent='window.__PRESET_WEEKS_DATA__='+JSON.stringify(weeksData)+';window.__PRESET_OFFSET__='+JSON.stringify(weekOffset)+';';const main=[...clone.querySelectorAll('script')].find(el=>el.textContent.trim().startsWith('const days='));if(main)main.parentNode.insertBefore(snapshot,main);else clone.querySelector('head').appendChild(snapshot);return new Blob(['<!DOCTYPE html>\n'+clone.outerHTML],{type:'text/html;charset=utf-8'})}
async function writeBlob(name,blob){const file=await saveDirectoryHandle.getFileHandle(name,{create:true}),writable=await file.createWritable();await writable.write(blob);await writable.close()}
function scheduleAutoSave(){clearTimeout(saveTimer);if(!saveDirectoryHandle)return;setSaveStatus('Changes pending...');saveTimer=setTimeout(()=>saveFile(true),1500)}
async function saveFile(automatic=false){if(saveBusy){saveQueued=true;return}if(!await ensureSaveDirectory(!automatic)){if(automatic)setSaveStatus('Press Save to restore folder permission.','err');return}saveBusy=true;saveQueued=false;try{commitInputs();calc();setSaveStatus('Saving HTML and annual Excel workbook...');const [excel,html]=await Promise.all([annualExcelBlob(),Promise.resolve(htmlSnapshotBlob())]);await Promise.all([writeBlob(excel.fileName,excel.blob),writeBlob('weekly_time_tracker.html',html)]);setSaveStatus('Saved '+excel.fileName+' and HTML at '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · OneDrive will sync the folder','ok')}catch(e){setSaveStatus('Save failed: '+(e.message||e),'err');if(!automatic)alert('The files could not be saved.\n\n'+(e.message||e))}finally{saveBusy=false;if(saveQueued){saveQueued=false;scheduleAutoSave()}}}
(async()=>{if(location.protocol==='file:')setSaveStatus('Open this page from GitHub Pages, not as a file:// URL.','err');try{saveDirectoryHandle=await loadHandle();if(saveDirectoryHandle){document.getElementById('folderBtn').textContent='Change Save Folder';if(await hasPermission(saveDirectoryHandle,false))setSaveStatus('Ready to save in: '+saveDirectoryHandle.name,'ok');else setSaveStatus('Press Save to restore access to: '+saveDirectoryHandle.name)}}catch(e){}})();
</script></body></html>
