<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Weekly Time Tracker</title><script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script><style>body{background:#0b0c10;color:#fff;font-family:-apple-system,Segoe UI,sans-serif;padding:20px}table{width:80%;margin:auto;table-layout:fixed;border-collapse:collapse;background:#17181c}th,td{border:1px solid #2f3138;padding:8px;text-align:center;vertical-align:middle}th:first-child,td:first-child{width:110px}input{width:58px;text-align:center;background:#2a2d34;color:#fff;border:0;border-radius:8px;padding:6px;font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em}.pos{color:#30d158}.neg{color:#ff453a}.zero{color:#8e8e93}.time-stack{font-family:ui-rounded,'SF Pro Rounded','SF Compact Rounded',-apple-system,sans-serif;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;letter-spacing:0.01em;white-space:pre}.actions{display:flex;justify-content:space-between;width:80%;margin:15px auto 0}.btn{padding:10px 18px;background:#3a3d45;color:#fff;border:1px solid #4a4d55;border-radius:10px}.btn:hover{background:#4a4d55}.corner-hidden{border:none!important;background:#0b0c10!important;box-shadow:none!important}thead th:nth-child(2){border-left:1px solid #2f3138!important}tbody tr:first-child td:first-child{border-top:1px solid #2f3138!important}.day-head{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.15}.this-week-btn{padding:3px 9px;margin:0 0 5px;font-size:10px;border-radius:7px}.folder-top-btn{width:30px;height:30px;padding:0;font-size:11px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center}.folder-top-btn svg{width:17px;height:17px;display:block}.icon-actions{display:flex;gap:8px;align-items:center}.icon-btn{width:32px!important;min-width:32px!important;max-width:32px!important;height:32px!important;min-height:32px!important;max-height:32px!important;padding:0!important;display:inline-flex;flex:0 0 32px;align-items:center;justify-content:center;border-radius:8px;box-sizing:border-box}.icon-btn svg{width:19px;height:19px;display:block}.save-status{width:80%;margin:10px auto 0;text-align:right;color:#a7abb5;font-size:12px}.save-status.ok{color:#30d158}.save-status.err{color:#ff453a}</style></head><body><div style="width:80%;margin:0 auto 10px;display:grid;grid-template-columns:110px repeat(5,1fr);align-items:center"><button id='prevWeek' class='btn' style="grid-column:1;justify-self:start;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">‹</button><button id='thisWeek' class='btn' style="grid-column:2;justify-self:center;padding:4px 12px;font-size:11px;border-radius:8px">This week</button><h2 style='grid-column:3 / 6;grid-row:1;margin:0;text-align:center'>Weekly Time Tracker</h2><button id='folderBtn' class='btn folder-top-btn' onclick='selectSaveFolder()' style="grid-column:6;grid-row:1;justify-self:center" title='Change save folder' aria-label='Change save folder'><svg viewBox='0 0 24 24' aria-hidden='true'><path d='M3 7.5h7l2-2h4.5A2.5 2.5 0 0 1 19 8v1H5a2 2 0 0 0-2 2z' fill='currentColor' opacity='.55'/><path d='M3 10h17l-2 9H5z' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linejoin='round'/><path d='M3 10V7.5h7l2-2h4.5A2.5 2.5 0 0 1 19 8v2' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linejoin='round'/></svg></button><button id='nextWeek' class='btn' style="grid-column:6;grid-row:1;justify-self:end;border-radius:50%;width:26px;height:26px;padding:0;font-size:13px;line-height:1">›</button></div><table id='tbl'><thead><tr><th class='corner-hidden'></th><th id='a0'></th><th id='a1'></th><th id='a2'></th><th id='a3'></th><th id='a4'></th></tr></thead><tbody><tr><td>Clock In</td></tr><tr><td>Lunch Out</td></tr><tr><td>Lunch In</td></tr><tr><td>Clock Out</td></tr><tr><td>Daily Balance</td></tr><tr><td>Progress</td></tr></tbody></table><div class='actions'><button class='btn' onclick='fillTheoretical()'>Autofill</button><div class='icon-actions'><button class='btn icon-btn' onclick='loadFromExcel()' title='Refresh from Excel' aria-label='Refresh from Excel'><svg viewBox='0 0 24 24' aria-hidden='true'><path d='M20 6v5h-5' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/><path d='M18.4 9A7 7 0 1 0 19 15' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'/><path d='M4 18v-5h5' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg></button><button class='btn icon-btn' onclick='saveFile()' title='Save' aria-label='Save'><svg viewBox='0 0 24 24' aria-hidden='true'><path d='M5 4.5A1.5 1.5 0 0 1 6.5 3h9.9L20 6.6v10.9a3.5 3.5 0 0 1-3.5 3.5h-9A2.5 2.5 0 0 1 5 18.5z' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linejoin='round'/><path d='M8 3v6h8V3.2M8 21v-7h8v7' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linejoin='round'/></svg></button></div></div><div id='saveStatus' class='save-status'>Select your local OneDrive folder once</div><script>const days=['Mo','Tu','We','Th','Fr'];const b=document.querySelector('tbody');for(let r=0;r<4;r++){for(let d=0;d<5;d++){let td=document.createElement('td');td.innerHTML='<input>';b.rows[r].appendChild(td)}}for(let r=4;r<6;r++){for(let d=0;d<5;d++)b.rows[r].appendChild(document.createElement('td'))}let m=new Date();m.setDate(m.getDate()-((m.getDay()+6)%7));let weekOffset=0;const STORAGE_KEY='wttWeeksData';const OFFSET_KEY='wttWeekOffset';let weeksData=(window.__PRESET_WEEKS_DATA__||{});try{weeksData=JSON.parse(localStorage.getItem(STORAGE_KEY))||weeksData}catch(e){}function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(weeksData))}catch(e){}}function mondayFor(off){let d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7)+off*7);return d}function weekKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function saveCurrentWeek(){const key=weekKey(mondayFor(weekOffset));const vals=[];for(let r=0;r<4;r++){const row=[];for(let c=0;c<5;c++)row.push(b.rows[r].cells[c+1].firstChild.value);vals.push(row)}weeksData[key]=vals;persist()}function loadWeek(off){weekOffset=off;try{localStorage.setItem(OFFSET_KEY,String(off))}catch(e){}const mon=mondayFor(weekOffset);const key=weekKey(mon);const vals=weeksData[key];for(let i=0;i<5;i++){let d=new Date(mon);d.setDate(mon.getDate()+i);document.getElementById('a'+i).innerHTML="<div class='day-head'><span>"+days[i]+"</span><small>"+d.getDate()+'-'+d.toLocaleString('en',{month:'long'}).toLowerCase()+"</small></div>"}for(let r=0;r<4;r++)for(let c=0;c<5;c++)b.rows[r].cells[c+1].firstChild.value=vals?vals[r][c]:'';calc()}function commitInputs(){document.querySelectorAll('input').forEach(i=>{i.value=norm(i.value)})}document.getElementById('prevWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset-1)});document.getElementById('nextWeek').addEventListener('click',()=>{commitInputs();calc();loadWeek(weekOffset+1)});document.addEventListener('click',e=>{if(e.target&&e.target.id==='thisWeek'){commitInputs();calc();loadWeek(0)}});function norm(v){v=(v||'').replace(/\D/g,'');if(!v)return'';let h,m;if(v.length<=2){h=+v;m=0}else if(v.length===3){h=+v[0];m=+v.slice(1)}else{h=+v.slice(0,-2);m=+v.slice(-2)}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}function mins(t,pm=false){if(!t)return null;let[a,b]=t.split(':').map(Number);if(pm&&a<12)a+=12;return a*60+b}function hm(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}function hmv(hours){let m=Math.round(hours*60);m=Math.abs(m);let h=Math.floor(m/60);let mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0')}document.querySelectorAll('input').forEach(i=>i.addEventListener('change',e=>{e.target.value=norm(e.target.value);calc();scheduleAutoSave()}));function calc(){saveCurrentWeek();let cum=0;for(let c=0;c<5;c++){let ci=mins(b.rows[0].cells[c+1].firstChild.value,false);let lo=mins(b.rows[1].cells[c+1].firstChild.value,true);let li=mins(b.rows[2].cells[c+1].firstChild.value,true);let co=mins(b.rows[3].cells[c+1].firstChild.value,true);let h=0;if(ci!=null&&co!=null){if(lo!=null&&li!=null){h=((lo-ci)+(co-li))/60;}else{h=(co-ci)/60;}}cum+=h;let bal=h-7;b.rows[4].cells[c+1].innerHTML=h?`<div class='time-stack'>${hmv(h)}<br><span class='${bal>0?'pos':(bal<0?'neg':'zero')}'>${hm(bal)}</span></div>`:'';let prog=cum-((c+1)*7);b.rows[5].cells[c+1].innerHTML=`<div class='time-stack'>${hmv(cum)}<br><span class='${prog>0?'pos':(prog<0?'neg':'zero')}'>${hm(prog)}</span></div>`;}}function fillTheoretical(){for(let c=1;c<=5;c++){b.rows[0].cells[c].firstChild.value='09:00';b.rows[1].cells[c].firstChild.value='';b.rows[2].cells[c].firstChild.value='';b.rows[3].cells[c].firstChild.value='04:00';}calc();scheduleAutoSave()}document.querySelectorAll('input').forEach(inp=>inp.addEventListener('keydown',e=>{const a=[...document.querySelectorAll('input')],i=a.indexOf(e.target),c=i%5,r=Math.floor(i/5),go=(rr,cc)=>{if(rr>=0&&rr<4&&cc>=0&&cc<5){a[rr*5+cc].focus();a[rr*5+cc].select()}};if(e.key==='Enter'){e.preventDefault();e.shiftKey?go(r-1,c):(r<3?go(r+1,c):go(0,c+1))}else if(e.key==='ArrowUp'){e.preventDefault();go(r-1,c)}else if(e.key==='ArrowDown'){e.preventDefault();go(r+1,c)}else if(e.key==='ArrowLeft'){e.preventDefault();go(r,c-1)}else if(e.key==='ArrowRight'){e.preventDefault();go(r,c+1)}}));let startOffset=(typeof window.__PRESET_OFFSET__==='number'?window.__PRESET_OFFSET__:0);try{const so=parseInt(localStorage.getItem(OFFSET_KEY),10);if(!isNaN(so))startOffset=so}catch(e){}const hadData=!!weeksData[weekKey(mondayFor(startOffset))];loadWeek(startOffset);if(!hadData)fillTheoretical();const DB='wttDB',STORE='handles',KEY='dir',FIRST=2,STEP=10;let dir=null,timer=null,busy=false,queued=false,lastMod=0;
function status(t,k=''){const e=document.getElementById('saveStatus');e.textContent=t;e.className='save-status'+(k?' '+k:'')}
function db(){return new Promise((a,z)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(STORE))r.result.createObjectStore(STORE)};r.onsuccess=()=>a(r.result);r.onerror=()=>z(r.error)})}
async function putHandle(h){const d=await db();return new Promise((a,z)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).put(h,KEY);t.oncomplete=()=>{d.close();a()};t.onerror=()=>z(t.error)})}
async function getHandle(){const d=await db();return new Promise((a,z)=>{const t=d.transaction(STORE),r=t.objectStore(STORE).get(KEY);r.onsuccess=()=>a(r.result||null);r.onerror=()=>z(r.error);t.oncomplete=()=>d.close()})}
async function allowed(h,ask){if(!h)return false;const o={mode:'readwrite'};if(await h.queryPermission(o)==='granted')return true;return ask&&await h.requestPermission(o)==='granted'}
async function selectSaveFolder(){try{dir=await showDirectoryPicker({id:'wtt',mode:'readwrite'});await putHandle(dir);folderBtn.title='Change save folder';folderBtn.setAttribute('aria-label','Change save folder');status('Folder selected: '+dir.name,'ok');return true}catch(e){if(e.name!=='AbortError')status(e.message,'err');return false}}
async function ensure(ask=true){if(!dir)dir=await getHandle();if(dir&&await allowed(dir,ask)){folderBtn.title='Change save folder';folderBtn.setAttribute('aria-label','Change save folder');return true}return ask?selectSaveFolder():false}
const p2=n=>String(n).padStart(2,'0'),sn=d=>d.getFullYear()+'-'+p2(d.getMonth()+1),fn=d=>'weekly_time_tracker_'+d.getFullYear()+'.xlsx';
function kd(k){const x=k.split('-').map(Number);return new Date(x[0],x[1]-1,x[2],12)}
function xt(v){if(!v)return null;const x=v.split(':').map(Number);return(x[0]*60+x[1])/1440}
function tt(v){if(v==null||v==='')return'';let f;if(typeof v==='number')f=((v%1)+1)%1;else if(v instanceof Date)f=(v.getUTCHours()*60+v.getUTCMinutes())/1440;else{const m=String(v).match(/(\d{1,2}):(\d{2})/);if(!m)return'';f=(+m[1]*60 + +m[2])/1440}const n=Math.round(f*1440)%1440;return p2(Math.floor(n/60))+':'+p2(n%60)}
function xd(v){if(v instanceof Date)return new Date(v.getUTCFullYear(),v.getUTCMonth(),v.getUTCDate(),12);if(typeof v==='number'){const d=new Date(Date.UTC(1899,11,30)+Math.round(v*86400000));return new Date(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),12)}return null}
function bd(){const x={style:'thin',color:{argb:'FF000000'}};return{top:x,left:x,bottom:x,right:x}}
function styl(c){c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD0CECE'}};c.font={name:'Calibri',size:11,bold:true};c.alignment={horizontal:'center',vertical:'middle'};c.border=bd()}
function work(s,col){const a=`${col}${s+2}`,b=`${col}${s+3}`,c=`${col}${s+4}`,d=`${col}${s+5}`;return`IF(AND(${a}<>\"\",${d}<>\"\"),IF(AND(${b}<>\"\",${c}<>\"\"),(${b}+IF(${b}<TIME(12,0,0),0.5,0)-${a})+(${d}+IF(${d}<TIME(12,0,0),0.5,0)-(${c}+IF(${c}<TIME(12,0,0),0.5,0))),${d}+IF(${d}<TIME(12,0,0),0.5,0)-${a}),0)`}
function signed(expr){const mins=`ROUND((${expr})*1440,0)`;return`IF(${mins}=0,\"00:00\",IF(${mins}<0,\"-\",\"\")&TEXT(ABS(${mins})/1440,\"[h]:mm\"))`}
function block(ws,s,d,v){for(let c=3;c<=7;c++){styl(ws.getCell(s,c));styl(ws.getCell(s+1,c))}for(let i=0;i<5;i++){const x=new Date(d);x.setDate(d.getDate()+i);ws.getCell(s,i+3).value=days[i];ws.getCell(s+1,i+3).value=x;ws.getCell(s+1,i+3).numFmt='dd-mmm'}const labs=['Clock in','Lunch out','Lunch in','Clock out','Daily Balance','Progress'];labs.forEach((x,r)=>{styl(ws.getCell(s+2+r,2));ws.getCell(s+2+r,2).value=x;for(let i=0;i<5;i++){const c=ws.getCell(s+2+r,i+3);c.border=bd();c.alignment={horizontal:'center',vertical:'middle'};c.font={name:'Calibri',size:11,bold:r>=4};if(r<4){c.value=xt(v?.[r]?.[i]);if(c.value==null)c.value='';c.numFmt='h:mm'}}});for(let i=0;i<5;i++){const col=String.fromCharCode(67+i),complete=`AND(${col}${s+2}<>\"\",${col}${s+5}<>\"\")`,worked=work(s,col);const dailyBalance=ws.getCell(s+6,i+3);dailyBalance.value={formula:`IF(${complete},${worked},\"\")`};dailyBalance.numFmt='[h]:mm';const workTerms=[];for(let j=0;j<=i;j++)workTerms.push(`(${work(s,String.fromCharCode(67+j))})`);const accumulated=workTerms.join('+'),progress=ws.getCell(s+7,i+3);progress.value={formula:accumulated};progress.numFmt='[h]:mm'}}
function clear(ws){if(ws.rowCount)ws.spliceRows(1,ws.rowCount);ws.columns=[]}
function build(ws,d){clear(ws);ws.getColumn(2).width=11.81;for(let c=3;c<=7;c++)ws.getColumn(c).width=7.64;const items=Object.entries(weeksData).map(([k,v])=>({d:kd(k),v})).filter(x=>sn(x.d)===sn(d)).sort((a,b)=>a.d-b.d);items.forEach((x,i)=>block(ws,FIRST+i*STEP,x.d,x.v));ws.pageSetup={orientation:'landscape',fitToPage:true,fitToWidth:1,fitToHeight:0};ws.printArea=items.length?`B2:G${9+(items.length-1)*STEP}`:'B2:G9'}
function importBook(wb){const o={};for(const ws of wb.worksheets)for(let r=FIRST;r<=ws.rowCount;r+=STEP){const d=xd(ws.getCell(r+1,3).value);if(d)o[weekKey(d)]=Array.from({length:4},(_,i)=>Array.from({length:5},(_,j)=>tt(ws.getCell(r+2+i,j+3).value)))}return o}
async function fh(d,create=false){try{return await dir.getFileHandle(fn(d),{create})}catch(e){if(e.name==='NotFoundError')return null;throw e}}
async function book(d){const w=new ExcelJS.Workbook(),h=await fh(d);if(h){const f=await h.getFile();lastMod=f.lastModified;if(f.size)await w.xlsx.load(await f.arrayBuffer())}return w}
async function loadFromExcel(){if(!await ensure())return;try{const d=mondayFor(weekOffset),h=await fh(d);if(!h){status('No annual Excel file yet. Press Save.');return}const f=await h.getFile(),w=new ExcelJS.Workbook();await w.xlsx.load(await f.arrayBuffer());const x=importBook(w);Object.assign(weeksData,x);persist();lastMod=f.lastModified;loadWeek(weekOffset);status('Loaded '+Object.keys(x).length+' week(s) from Excel.','ok')}catch(e){status('Load failed: '+e.message,'err')}}
async function excel(){const d=mondayFor(weekOffset),w=await book(d),x=importBook(w),cur=weekKey(d);for(const[k,v]of Object.entries(x))if(k!==cur)weeksData[k]=v;let ws=w.getWorksheet(sn(d)),state=ws?ws.state:'visible';if(!ws)ws=w.addWorksheet(sn(d));build(ws,d);ws.state=state;if(!w.worksheets.some(x=>x.state==='visible'))ws.state='visible';w.calcProperties.fullCalcOnLoad=true;w.calcProperties.forceFullCalc=true;w.calcProperties.calcMode='auto';return{name:fn(d),blob:new Blob([await w.xlsx.writeBuffer()],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'})}}
function html(){const d=document.documentElement.cloneNode(true),x=document.createElement('script'),old=d.querySelector('#snapshotData');if(old)old.remove();x.id='snapshotData';x.textContent='window.__PRESET_WEEKS_DATA__='+JSON.stringify(weeksData)+';window.__PRESET_OFFSET__='+weekOffset+';';const q=[...d.querySelectorAll('script')].find(e=>e.textContent.trim().startsWith('const days='));q.parentNode.insertBefore(x,q);return new Blob(['<!DOCTYPE html>\n'+d.outerHTML],{type:'text/html;charset=utf-8'})}
async function wr(n,b){const h=await dir.getFileHandle(n,{create:true}),w=await h.createWritable();await w.write(b);await w.close();return h.getFile()}
function scheduleAutoSave(){clearTimeout(timer);if(dir){status('Changes pending...');timer=setTimeout(()=>saveFile(true),1500)}}
async function saveFile(auto=false){if(busy){queued=true;return}if(!await ensure(!auto))return;busy=true;try{commitInputs();calc();const d=mondayFor(weekOffset),h=await fh(d);if(h&&lastMod&&(await h.getFile()).lastModified>lastMod){status('Excel changed externally. Use Load from Excel first.','err');return}status('Saving Excel and HTML...');const e=await excel(),f=await Promise.all([wr(e.name,e.blob),wr('weekly_time_tracker.html',html())]);lastMod=f[0].lastModified;status('Saved '+e.name+' and HTML.','ok')}catch(e){status('Save failed: '+e.message,'err');if(!auto)alert(e.message)}finally{busy=false;if(queued){queued=false;scheduleAutoSave()}}}
(async()=>{try{dir=await getHandle();if(dir){folderBtn.title='Change save folder';folderBtn.setAttribute('aria-label','Change save folder');status(await allowed(dir,false)?'Ready. Use Load from Excel after editing Excel.':'Press Save or Load to restore folder access.','ok')}}catch(e){}})();
</script></body></html>
